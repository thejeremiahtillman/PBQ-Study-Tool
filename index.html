ut re-reading source)","wrongAnswers":["Scenario B → Differential — Differential does NOT clear the archive bit. It captures all changes since the last full backup, meaning each differential gets larger over time. Incremental clears the archive bit each night, keeping each backup smaller.","Scenario C → Incremental — Incremental clears the archive bit. Differential does not. The key differentiator is archive bit behavior.","Scenario D → Full Backup — A synthetic full does not read directly from the source data; it constructs the full backup by merging existing backup sets. A standard full backup reads all source data directly."],"rationale":"Backup types are directly tested on the 220-1202 exam. The critical differentiator between incremental and differential is archive bit behavior: incremental clears it, differential does not. Restore time also differs: incremental requires the full + every incremental; differential requires only the full + the latest differential."},{"id":35,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.4","objectiveText":"Summarize environmental impacts and local environmental controls.","title":"Change Management Documentation Requirements","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"A company is implementing a formal change management process. Categorize each item as either a required element of a Change Request (pre-change) or a required element of the Change Documentation (post-change).\n\nItems:\nA. Rollback plan if the change fails\nB. Summary of what was changed and when\nC. Description of the proposed change and reason\nD. Confirmation that affected users were notified\nE. Approval signatures from change review board\nF. Test results verifying the change worked as intended\nG. Risk assessment of the potential impact\nH. Lessons learned and any deviations from the plan","correctAnswer":"Change Request (Pre-Change): C, A, G, E, D\n  C - Description of the proposed change and reason\n  A - Rollback plan\n  G - Risk assessment\n  E - Approval signatures\n  D - Notification to affected users\n\nChange Documentation (Post-Change): B, F, H\n  B - Summary of what was changed and when\n  F - Test results verifying success\n  H - Lessons learned and deviations","wrongAnswers":["Rollback plan as post-change — The rollback plan must exist before the change is implemented, not after. If the change fails, you need the plan ready to execute immediately.","Test results as pre-change — Test results can only exist after the change has been made and tested. They are documented post-implementation.","Approval signatures as post-change — Approvals must be obtained before the change is made. Signing off after the fact defeats the purpose of the change review board."],"rationale":"Change management is a formal process requiring a change request with risk assessment, rollback plan, and approvals before any change. Post-change documentation captures what was done, verification, and lessons learned. This prevents unauthorized changes and provides an audit trail."},{"id":36,"exam":"220-1201","domain":"4.0 Virtualization and Cloud Computing","objective":"4.1 / 4.2","objectiveText":"Summarize cloud-computing concepts including deployment models and characteristics.","title":"Cloud Deployment Model Selection","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"A cloud architect is evaluating deployment models for four different customers. Match each customer scenario to the correct cloud deployment model.\n\nDeployment models: Public Cloud, Private Cloud, Hybrid Cloud, Community Cloud\n\nCustomer scenarios:\nA. A startup that wants to run all of its web applications using AWS, paying only for what they use, with no on-premises infrastructure\nB. A bank that builds its own virtualized data center on-site to keep all customer financial data fully under its own control, isolated from all other organizations\nC. A hospital system that keeps patient records on its own secure on-premises servers but bursts workloads to AWS during peak demand periods\nD. Three government agencies that share a dedicated cloud environment built specifically for federal compliance requirements, with costs split between them","correctAnswer":"A → Public Cloud (shared infrastructure owned by a third party, accessible over the internet, pay-as-you-go)\nB → Private Cloud (dedicated infrastructure managed by a single organization, fully isolated)\nC → Hybrid Cloud (mix of private on-premises and public cloud, often used for \"cloud bursting\")\nD → Community Cloud (shared infrastructure between organizations with common needs, such as government compliance)","wrongAnswers":["Scenario D → Public Cloud — A community cloud is distinct from public cloud because access is restricted to specific member organizations sharing compliance requirements. Public cloud is open to anyone.","Scenario C → Public Cloud — The scenario specifically describes keeping sensitive data on-premises while extending to the cloud for overflow. That combination is the definition of hybrid cloud.","Scenario B → Hybrid Cloud — A hybrid cloud requires both private and public components. The bank scenario describes a fully isolated, self-managed environment with no public cloud component, which is private cloud."],"rationale":"Cloud deployment models define who owns the infrastructure and who can access it. Public = anyone, third-party owned. Private = one org, self-managed. Hybrid = mix of both. Community = shared between specific orgs with common goals. The exam distinguishes all four and tests them with scenario-based questions."},{"id":37,"exam":"220-1201","domain":"4.0 Virtualization and Cloud Computing","objective":"4.2","objectiveText":"Summarize aspects of client-side virtualization.","title":"Cloud Characteristics Classification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each cloud computing characteristic or scenario under the correct cloud property that best describes it.\n\nCloud properties: Elasticity, High Availability / Redundancy, Metered Utilization, Multitenancy, File Synchronization\n\nScenarios:\nA. A company's cloud servers automatically add 10 more virtual machines during a product launch traffic spike, then remove them when traffic normalizes\nB. An e-commerce site remains online despite one of its three cloud data centers failing completely\nC. A developer is billed only for the 47 hours their virtual machine was running this month\nD. Multiple competing companies run their workloads on the same physical AWS server infrastructure, isolated by the hypervisor\nE. A user saves a document on their laptop and it automatically appears on their phone and tablet within seconds","correctAnswer":"A → Elasticity (seamless scaling up and down based on demand)\nB → High Availability / Redundancy (systems remain available despite failures)\nC → Metered Utilization (pay for actual usage, like a utility bill)\nD → Multitenancy (multiple customers share the same physical infrastructure)\nE → File Synchronization (data is duplicated across devices/locations automatically)","wrongAnswers":["Scenario A → High Availability — High availability refers to the system staying up despite failures. Scenario A is about scaling resources to handle demand, which is elasticity.","Scenario C → High Availability — Billing per hour of usage is metered utilization, not availability. These are completely different properties.","Scenario D → Elasticity — Multitenancy is about multiple customers sharing infrastructure. Elasticity is about scaling. Scenario D describes the shared-infrastructure model."],"rationale":"Cloud characteristics are directly tested on the 220-1201 exam. Elasticity = scale on demand. High availability = uptime despite failures. Metered = pay for use. Multitenancy = shared hardware, logical isolation. File sync = data replicated across locations. These are not interchangeable concepts."},{"id":38,"exam":"220-1201","domain":"4.0 Virtualization and Cloud Computing","objective":"4.1","objectiveText":"Summarize cloud-computing concepts.","title":"Rapid Elasticity vs Measured Service Scenario","difficulty":"Hard","uiType":"Radio Button","scenario":"An organization is designing its cloud infrastructure. The CTO says: \"Our application must automatically scale from 2 servers to 200 servers in under 60 seconds when demand spikes at 9 AM every weekday, and scale back down by noon. We should only pay for the servers that are actually running.\"\n\nThis requirement is best described as a combination of which two NIST-defined cloud computing essential characteristics?\n\nO Broad network access and resource pooling\nO Rapid elasticity and measured service\nO On-demand self-service and multitenancy\nO High availability and community cloud deployment\nO Resource pooling and private cloud deployment","correctAnswer":"Rapid elasticity and measured service.\n\nRapid elasticity: the ability to provision and release resources quickly and automatically to scale with demand. Measured service: cloud systems automatically control and optimize resource use, with usage monitored and billed accordingly (only paying for what you use). Both characteristics are present in the CTO's requirement.","wrongAnswers":["Broad network access and resource pooling — Broad network access is about being accessible over the network from various devices. Resource pooling is about serving multiple consumers from shared resources. Neither specifically addresses the auto-scaling or per-use billing described.","On-demand self-service and multitenancy — On-demand self-service is about users being able to provision resources themselves without human interaction. Multitenancy is about shared infrastructure. Neither directly addresses auto-scaling based on load patterns.","High availability and community cloud — High availability is about uptime, and community cloud is a deployment model. These don't address the scaling and billing requirements."],"rationale":"The NIST definition of cloud computing identifies five essential characteristics: on-demand self-service, broad network access, resource pooling, rapid elasticity, and measured service. The exam tests whether students can identify which characteristics apply to a given scenario. Auto-scaling = rapid elasticity; pay-per-use billing = measured service."},{"id":39,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.5","objectiveText":"Given a scenario, troubleshoot problems with printers.","title":"Laser Printer Output Defect Diagnosis","difficulty":"Hard","uiType":"Drag and Drop (Match)","scenario":"A laser printer is producing defective output. Match each print quality symptom to its most likely root cause.\n\nSymptoms:\nA. Every printed page has a vertical black line running from top to bottom in the same position\nB. Toner smears across the page when rubbed with a finger\nC. Faint, ghost images of a previous print job appear on the current page\nD. Pages are completely blank with no toner at all\nE. Horizontal white bands appear across the page at regular intervals\nF. One side of the page is darker than the other\n\nRoot causes: Scratched/damaged drum, Defective fuser assembly, Ghost image (drum not fully discharged), Depleted or missing toner cartridge, Low toner / partially depleted cartridge, Dirty or defective transfer corona wire/roller","correctAnswer":"A (Vertical black line) → Scratched/damaged drum (a scratch on the drum picks up toner consistently in that spot every rotation)\nB (Toner smears) → Defective fuser assembly (the fuser applies heat and pressure to bond toner to paper; if it fails, toner never fuses and wipes off)\nC (Ghost images) → Ghost image / drum not fully discharged (residual charge on the drum holds leftover toner that partially transfers)\nD (Completely blank) → Depleted or missing toner cartridge (no toner = no image)\nE (Horizontal white bands) → Low toner / partially depleted cartridge (uneven toner distribution causes banding)\nF (Uneven darkness) → Dirty or defective transfer corona wire/roller (the transfer corona applies charge across the page; if dirty, charge is uneven)","wrongAnswers":["Symptom B → Low toner — Low toner causes faded or banded output, not smearing. Smearing specifically indicates the fuser is not properly bonding toner to the page.","Symptom C → Scratched drum — A scratched drum causes vertical lines (consistent in the same horizontal position every rotation), not ghost images. Ghost images are caused by incomplete drum discharge.","Symptom A → Low toner — Low toner produces faded or horizontally banded output. A vertical line that is consistently in the same position every page is caused by a physical defect on the drum."],"rationale":"Laser printer troubleshooting requires understanding the laser printing process: charge, expose, develop, transfer, fuse, clean. Fuser problems = smearing. Drum damage = vertical lines. Discharge failure = ghosting. Transfer corona issues = uneven darkness. Toner depletion = fading or blank pages."},{"id":40,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.5","objectiveText":"Given a scenario, troubleshoot problems with printers.","title":"Printer Connectivity Troubleshooting","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A user reports that their workstation can no longer print to the shared office laser printer. The printer was working yesterday. Other users on the same network can print to it fine.\n\nQuestion 1: Since other users can print successfully, where is the problem most likely isolated?\n[ ▼ ] Options: The printer hardware / The network switch / The user's workstation or its printer configuration / The building's internet connection\n\nQuestion 2: The technician checks the print queue on the user's workstation and finds 12 stuck jobs all showing \"Error\" status. What is the correct way to fix this?\n[ ▼ ] Options: Restart the printer / Clear the print queue and restart the Print Spooler service / Reinstall Windows / Replace the network cable\n\nQuestion 3: After clearing the queue, the user tries to print again and gets \"Driver is unavailable.\" What is the most appropriate next step?\n[ ▼ ] Options: Replace the printer / Reinstall or update the printer driver / Increase RAM in the workstation / Disable the Windows Firewall","correctAnswer":"Q1: The user's workstation or its printer configuration — since other users can print, the printer hardware and network are functioning. The problem is specific to one workstation.\nQ2: Clear the print queue and restart the Print Spooler service — stuck jobs in the spooler block all new jobs. Clear the queue manually (or stop the spooler, delete files in C:\\Windows\\System32\\spool\\PRINTERS, restart the spooler).\nQ3: Reinstall or update the printer driver — \"Driver is unavailable\" means the driver is missing, corrupted, or incompatible. Reinstalling the correct driver resolves this.","wrongAnswers":["Q1: The printer hardware — if the printer had a hardware failure, no users could print. Since only one user is affected, the issue is on the workstation.","Q2: Reinstall Windows — stuck print jobs are a common, easily resolved software issue. A Windows reinstall is a drastic last resort completely disproportionate to this problem.","Q3: Disable Windows Firewall — printer driver errors are not caused by the firewall. Disabling the firewall creates a security vulnerability and does not address the missing driver."],"rationale":"Printer troubleshooting requires isolating whether the issue is with the printer, the network, or the specific workstation. A stuck print spooler is one of the most common printer issues and has a specific fix: stop spooler, clear spool folder, restart spooler. Driver errors require driver reinstallation."},{"id":41,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.5","objectiveText":"Given a scenario, troubleshoot problems with printers.","title":"Laser Printer Maintenance Kit Application","difficulty":"Medium","uiType":"Radio Button","scenario":"A laser printer has been in service for 3 years and is now showing the following issues: print quality is degraded, the fuser occasionally jams paper, and the pickup rollers are failing to grab paper consistently. The printer has printed approximately 200,000 pages since its last service.\n\nWhat is the most cost-effective and appropriate action?\n\nO Replace the entire printer\nO Install a maintenance/service kit containing replacement fuser, pickup rollers, and transfer roller\nO Replace only the toner cartridge\nO Upgrade the printer's RAM\nO Reset the page count in the printer's NVRAM only, without replacing any parts","correctAnswer":"Install a maintenance/service kit.\n\nLaser printer maintenance kits contain the high-wear components that typically fail at a specific page count threshold: the fuser assembly, pickup rollers, transfer roller, and separation pads. At 200,000 pages, this is a routine, scheduled maintenance interval for most enterprise laser printers. Replacing just the kit is far less expensive than a new printer and directly addresses all three described symptoms.","wrongAnswers":["Replace only the toner cartridge — Toner affects print quality (fading, streaks) but does not cause paper jams or pickup failures. All three symptoms together point to mechanical wear components, not toner.","Replace the entire printer — a printer at 200,000 pages is not at end-of-life for most enterprise models. Maintenance kits exist specifically to restore these printers to full operation cost-effectively.","Reset the page count in NVRAM only — resetting the counter without replacing worn parts does not fix the physical problems. The printer will continue to malfunction."],"rationale":"Laser printer maintenance kits are a standard service item tested on the 220-1201 exam. The fuser, pickup rollers, and transfer roller are consumables with a rated page-count lifespan. When a printer reaches that threshold and shows the symptoms described, the maintenance kit is the correct answer — not a full replacement."},{"id":42,"exam":"220-1201","domain":"1.0 Mobile Devices","objective":"1.3","objectiveText":"Given a scenario, configure basic mobile device network connectivity and provide application support.","title":"Mobile Device Synchronization Configuration","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A user just got a new Android phone and wants to configure it so that their contacts, calendar, and photos are backed up automatically and available on all their devices.\n\nQuestion 1: What Google service should be enabled to synchronize contacts and calendar data across Android devices?\n[ ▼ ] Options: Google Drive / Google Account Sync / Google Photos / Google Assistant\n\nQuestion 2: What setting controls whether synchronization happens only when the device is on Wi-Fi vs. using cellular data?\n[ ▼ ] Options: Background App Refresh / Sync over Wi-Fi only (Data Saver / Background data toggle) / Airplane Mode / Battery Saver Mode\n\nQuestion 3: The user wants their photos backed up automatically at full resolution. Which storage consideration should the technician explain?\n[ ▼ ] Options: Full resolution backup counts against Google account storage quota / Photos are free at any resolution / Full resolution is only available on iOS / Google automatically compresses all photos regardless of setting","correctAnswer":"Q1: Google Account Sync — enabling sync for the Google account synchronizes contacts, calendar, Gmail, and other Google services automatically.\nQ2: Sync over Wi-Fi only — restricting background sync to Wi-Fi prevents excess cellular data consumption and potential overage charges.\nQ3: Full resolution backup counts against Google account storage quota — Google offers limited free storage (15 GB shared across Drive, Gmail, Photos). Original/full-resolution photos count against this quota, while \"Storage Saver\" quality was formerly free but now also counts.","wrongAnswers":["Q1: Google Drive — Google Drive is for file storage. While Google Photos integrates with Drive, the core contacts/calendar sync is handled by Google Account Sync settings, not Drive.","Q2: Airplane Mode — Airplane Mode disables all radios entirely. The question asks how to allow sync on Wi-Fi but restrict cellular data, which is a separate per-app data setting.","Q3: Photos are free at any resolution — this was previously true for 'High Quality' photos but changed in 2021. All backup now counts against storage quota."],"rationale":"Mobile synchronization requires knowing how cloud accounts integrate with device data. Google Account Sync manages contacts/calendar. Data usage controls prevent cellular overages during background sync. Storage quota awareness is a practical issue technicians must be able to explain to users."},{"id":43,"exam":"220-1201","domain":"1.0 Mobile Devices","objective":"1.3","objectiveText":"Given a scenario, configure basic mobile device network connectivity and provide application support.","title":"iOS vs Android Synchronization Methods","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each synchronization or backup method to the mobile platform (iOS or Android) or shared scenario where it is the primary/native approach.\n\nMethods:\nA. iTunes / Finder wired sync over USB to a Mac or Windows PC\nB. Google Account Sync for contacts, calendar, and app data\nC. iCloud Backup for full device data including app data and device settings\nD. Near Field Communication (NFC) tap to transfer data between devices\nE. Android Backup Service through Google One\nF. Apple AirDrop for wireless file transfer to nearby Apple devices\n\nPlatforms: iOS Only, Android Only, Both Platforms","correctAnswer":"A (iTunes/Finder USB sync) → iOS Only\nB (Google Account Sync) → Android Only (native Google ecosystem)\nC (iCloud Backup) → iOS Only\nD (NFC tap transfer) → Both Platforms (NFC is supported on both modern Android and iPhone)\nE (Android Backup via Google One) → Android Only\nF (AirDrop) → iOS Only (AirDrop is Apple-exclusive)","wrongAnswers":["iTunes/Finder sync → Both Platforms — iTunes/Finder is exclusively for Apple devices. Android uses Android File Transfer on Mac or Windows File Explorer for USB access.","AirDrop → Both Platforms — AirDrop is Apple-only. Android has Nearby Share (now Quick Share) as its equivalent for local wireless transfers.","NFC → iOS Only — NFC is widely supported on Android for payments and data transfer. Apple supports NFC on iPhone but historically limited it to Apple Pay before expanding its use."],"rationale":"Knowing platform-specific vs. cross-platform features is directly tested in objective 1.3. iCloud and iTunes/Finder are iOS-specific. Google Account Sync and Android Backup are Android-specific. NFC is supported on both platforms. AirDrop and Nearby Share/Quick Share are platform-specific wireless transfer equivalents."},{"id":44,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.9","objectiveText":"Identify common features and tools of the Linux client/desktop operating system.","title":"Linux Command Function Matching","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each Linux command to its correct primary function. Drag each description to the correct command.\n\nCommands: ls, chmod, grep, ps, df, top, sudo, apt, fsck, cat\n\nFunctions:\n1. Displays real-time CPU and memory utilization for all running processes\n2. Lists files and directories in the current directory\n3. Runs a command with superuser (root) privileges for that single command\n4. Searches for a text pattern within a file or output stream\n5. Displays disk space usage for all mounted file systems\n6. Changes the read/write/execute permissions of a file or directory\n7. Displays the contents of a text file to the terminal\n8. Shows a snapshot of currently running processes and their PIDs\n9. Installs, updates, or removes software packages (Debian/Ubuntu)\n10. Checks and repairs a Linux file system for errors","correctAnswer":"ls → 2 (List directory contents)\nchmod → 6 (Change file permissions)\ngrep → 4 (Search for text pattern)\nps → 8 (Snapshot of running processes)\ndf → 5 (Disk free space)\ntop → 1 (Real-time CPU/memory)\nsudo → 3 (Elevated privilege for one command)\napt → 9 (Package manager)\nfsck → 10 (File system check/repair)\ncat → 7 (Display file contents)","wrongAnswers":["top → 8 (ps) — Both show process information, but ps gives a static snapshot while top provides a real-time, continuously updating view. These are commonly confused.","df → 10 (fsck) — df shows disk free space (how much space is available). fsck checks the file system for logical errors. These are completely different operations.","sudo → 9 (apt) — sudo is a privilege escalation tool that runs any command as superuser. apt is specifically a package manager. While apt often requires sudo, they serve different purposes."],"rationale":"Linux commands are directly tested on the 220-1202 exam. Key distinctions: top vs ps (real-time vs snapshot), df vs du (free space vs used space), sudo vs su (single command elevation vs full user switch), apt vs dnf (Debian vs Red Hat package managers), fsck vs chkdsk (Linux vs Windows disk check equivalents)."},{"id":45,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.9","objectiveText":"Identify common features and tools of the Linux client/desktop operating system.","title":"Linux chmod Permission Calculation","difficulty":"Hard","uiType":"Text Input","scenario":"A Linux administrator needs to set permissions on a script file called deploy.sh with these requirements:\n- The file owner should have read, write, and execute permissions\n- Members of the file's group should have read and execute permissions only\n- All other users should have no permissions at all\n\nUsing octal (numeric) notation, type the chmod command that sets exactly these permissions on deploy.sh.","correctAnswer":"chmod 750 deploy.sh\n\nOctal breakdown:\nOwner: read(4) + write(2) + execute(1) = 7\nGroup: read(4) + write(0) + execute(1) = 5\nOthers: no permissions = 0\n\nThe full command is: chmod 750 deploy.sh","wrongAnswers":["chmod 755 deploy.sh — This gives others read and execute permission (rwxr-xr-x). The requirement specifies NO permissions for others, which is 0, not 5.","chmod 744 deploy.sh — This gives the group only read (4) with no execute, and others read-only (4). The group needs execute permission (5=r-x), and others need nothing (0).","chmod 777 deploy.sh — This gives everyone full read/write/execute permissions, which violates the requirement to deny all access to others."],"rationale":"chmod octal notation assigns three digits: owner, group, other. Each digit is the sum of: read=4, write=2, execute=1. 7=rwx, 5=r-x, 4=r--, 0=---. The requirement maps to 7 (owner), 5 (group), 0 (others) = chmod 750. This is a frequently tested Linux permissions concept."},{"id":46,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.9","objectiveText":"Identify common features and tools of the Linux client/desktop operating system.","title":"Linux Network Diagnostics CLI","difficulty":"Hard","uiType":"Command Prompt / Terminal","scenario":"A Linux workstation cannot connect to the company's internal file server at 10.10.5.20. The technician opens a terminal and needs to investigate systematically.\n\nThe following test results are available:\n- ping 127.0.0.1 → success\n- ping 10.10.5.1 (gateway) → success  \n- ping 10.10.5.20 (file server) → 100% packet loss\n- dig google.com → returns valid IP addresses\n\nBased on this output, type the Linux command you would use next to trace the network path from this workstation to 10.10.5.20 to identify where connectivity is being lost.","correctAnswer":"traceroute 10.10.5.20\n\ntraceroute (Linux/macOS) is the equivalent of Windows tracert. It sends packets with incrementing TTL values to map each hop along the path. When the file server is reachable by IP but not responding to ping, traceroute helps identify whether packets are being blocked at a firewall or router before reaching the destination.\n\nNote: If ICMP is blocked, traceroute -T 10.10.5.20 uses TCP instead of ICMP.","wrongAnswers":["tracert 10.10.5.20 — tracert is the Windows command. The Linux equivalent is traceroute. Using the wrong OS command will produce 'command not found' errors.","nslookup 10.10.5.20 — nslookup performs DNS lookups. DNS is confirmed working (dig google.com succeeded). The issue is IP-layer connectivity, not DNS.","netstat -an — netstat shows active connections and listening ports on the local machine. It cannot show the network path to a remote host."],"rationale":"On Linux, traceroute maps the path packets take to a destination. This is the correct follow-up after confirming local connectivity and gateway reachability when a specific remote host is unreachable. Remember: Windows = tracert, Linux/macOS = traceroute. DNS is not the issue here since dig succeeded."},{"id":47,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.8","objectiveText":"Explain common features and tools of the macOS/desktop operating system.","title":"macOS Application and File Management","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each macOS-specific file type, location, or tool to its correct description.\n\nmacOS Items: .dmg file, .app file / /Applications, /Users/username/, Finder, Time Machine, Spotlight, Terminal, Keychain Access\n\nDescriptions:\nA. The standard location where end-user applications are installed on macOS\nB. A disk image file used to distribute macOS applications (mount and drag to install)\nC. The macOS package format for an application (a bundle of executable and resources)\nD. The user's home directory containing Documents, Desktop, Downloads, etc.\nE. macOS's built-in graphical backup solution that automatically backs up to an external drive or network location\nF. A system-wide search tool for files, apps, emails, and other content\nG. A Unix-based command-line interface used to run scripts and commands on macOS\nH. macOS's built-in password and certificate manager used to store and retrieve credentials","correctAnswer":"A → /Applications (standard install location for macOS apps)\nB → .dmg file (disk image distribution format)\nC → .app file (macOS application bundle)\nD → /Users/username/ (user home directory)\nE → Time Machine (built-in backup solution)\nF → Spotlight (system-wide search, triggered by Cmd+Space)\nG → Terminal (Unix command-line access)\nH → Keychain Access (credential and certificate manager)","wrongAnswers":[".dmg vs .app confusion — .dmg is the delivery container (like an installer package). .app is the actual application bundle that gets dragged into /Applications. These are two separate stages of the macOS install process.","Keychain Access → Time Machine — Keychain stores passwords, certificates, and keys. Time Machine handles backups. These serve completely different functions.","Spotlight → Finder — Finder is the graphical file manager (equivalent to Windows Explorer). Spotlight is the search overlay. Both help find files but through different mechanisms."],"rationale":"macOS-specific tools are tested on the 220-1202 exam. Key items: .dmg = distribution container, .app = application bundle, /Applications = install location, /Users/username/ = home directory, Time Machine = backup, Spotlight = search, Terminal = CLI, Keychain Access = credential manager."},{"id":48,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.9","objectiveText":"Identify common features and tools of the Linux client/desktop operating system.","title":"Linux Config File Identification","difficulty":"Hard","uiType":"Drag and Drop (Match)","scenario":"Match each Linux configuration file to its correct purpose.\n\nConfig files: /etc/passwd, /etc/shadow, /etc/hosts, /etc/fstab, /etc/resolv.conf\n\nPurposes:\nA. Contains entries that map IP addresses to hostnames for local name resolution, bypassing DNS\nB. Stores the list of registered user accounts including username, UID, GID, home directory, and shell — but NOT the actual password hashes\nC. Lists all disks and partitions to be automatically mounted at startup, including their mount points and options\nD. Contains the hashed passwords for all user accounts, readable only by root\nE. Specifies which DNS servers the system queries for name resolution","correctAnswer":"/etc/passwd → B (user account info, no actual password hashes — those are in shadow)\n/etc/shadow → D (hashed passwords, root-only readable)\n/etc/hosts → A (local hostname-to-IP mappings, bypasses DNS)\n/etc/fstab → C (filesystem mount table, auto-mounts at boot)\n/etc/resolv.conf → E (DNS server configuration)","wrongAnswers":["/etc/passwd → D (shadow) — This is a common misconception. Despite the name, /etc/passwd does NOT store actual password hashes in modern Linux systems. The hashes are in /etc/shadow. /etc/passwd stores account metadata and shows an 'x' placeholder for the password field.","/etc/hosts → E (resolv.conf) — /etc/hosts provides local, manual hostname resolution before DNS is queried. /etc/resolv.conf points to DNS server IP addresses. These are different layers of name resolution.","/etc/fstab → A (hosts) — /etc/fstab is about disk mount configuration, not name resolution. These serve completely different purposes."],"rationale":"Linux configuration files are directly tested on the 220-1202 exam. The most common trap is /etc/passwd vs /etc/shadow — passwd has user account info but NOT password hashes (those live in shadow). /etc/hosts enables local hostname overrides before DNS lookup. /etc/fstab controls what gets mounted at startup."},{"id":49,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.8","objectiveText":"Explain the basics of scripting.","title":"Scripting Language to Platform Matching","difficulty":"Easy","uiType":"Drag and Drop (Match)","scenario":"Match each scripting language or file type to its correct platform/environment and primary use case.\n\nScripting types: .bat (Batch file), .ps1 (PowerShell script), .sh (Shell script), .vbs (VBScript), Python (.py)\n\nDescriptions:\nA. Cross-platform scripting language commonly used for automation, IT scripting, and data tasks; runs on Windows, macOS, and Linux\nB. Legacy Windows command-line automation with .bat extension; roots in MS-DOS; still widely used for simple tasks\nC. Modern Windows administrative scripting using cmdlets; included with Windows 10/11; powerful for Active Directory and system management\nD. Unix/Linux/macOS shell automation that begins with a shebang line (#!/bin/bash); used for system admin tasks on Linux servers\nE. Windows scripting that runs in the Windows Script Host; used for COM object automation and Office scripting; .vbs extension","correctAnswer":"Python (.py) → A (cross-platform automation)\n.bat → B (legacy Windows CLI, MS-DOS roots)\n.ps1 → C (modern Windows admin scripting, cmdlets)\n.sh → D (Unix/Linux/macOS shell scripting, shebang line)\n.vbs → E (VBScript, Windows Script Host, COM automation)","wrongAnswers":[".ps1 → .bat — PowerShell (.ps1) is a modern, object-oriented scripting environment built on .NET. Batch files (.bat) are legacy text scripts running CMD commands. These are not interchangeable; PowerShell is significantly more capable.",".sh → .bat — Shell scripts (.sh) run in Unix/Linux/macOS environments. Batch files (.bat) run in Windows CMD. They are syntactically and functionally different.","Python → .ps1 — Python is cross-platform and not Windows-specific. PowerShell (.ps1) is Windows-first (though cross-platform versions exist). Python is typically used for broader scripting and development tasks."],"rationale":"Scripting language identification is tested on the 220-1202 exam. Key associations: .bat = Windows legacy, .ps1 = Windows modern admin, .sh = Linux/macOS Unix shell, .vbs = Windows Script Host, .py = cross-platform Python. The shebang line (#!/bin/bash) is the giveaway for shell scripts."},{"id":50,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.8","objectiveText":"Explain the basics of scripting.","title":"PowerShell Use Case Identification","difficulty":"Medium","uiType":"Radio Button","scenario":"A systems administrator needs to automate a task that runs every night at midnight on a Windows Server: it should check all user accounts in Active Directory, find any accounts that have not logged in for more than 90 days, disable those accounts, and generate a log file with the list of disabled accounts.\n\nWhich scripting tool is the most appropriate choice for this task on Windows Server?\n\nO Batch file (.bat)\nO Python script (.py)\nO PowerShell script (.ps1)\nO VBScript (.vbs)\nO Shell script (.sh)","correctAnswer":"PowerShell script (.ps1)\n\nPowerShell is the correct choice because: (1) it has native cmdlets for Active Directory management (Get-ADUser, Disable-ADAccount), (2) it integrates deeply with Windows Server and all Microsoft services, (3) it can be scheduled via Windows Task Scheduler, (4) it supports output logging natively, and (5) it is the current standard for Windows Server administration. Microsoft has been transitioning all Windows Server automation to PowerShell.","wrongAnswers":["Batch file (.bat) — Batch files use CMD syntax and have very limited capabilities for interacting with Active Directory. You cannot natively query AD user last login dates with a .bat file.","Shell script (.sh) — Shell scripts run on Unix/Linux/macOS. They cannot natively run on Windows Server without additional tools like WSL, and have no native access to Active Directory.","VBScript (.vbs) — VBScript can interact with COM objects including some ADSI (Active Directory Service Interfaces), but it is a legacy, deprecated technology. PowerShell is the modern standard and is far more capable for this task."],"rationale":"PowerShell is Microsoft's designated automation platform for Windows Server administration. It has purpose-built modules for Active Directory (ActiveDirectory module with cmdlets like Get-ADUser, Disable-ADAccount), scheduled task integration, and native logging. The exam tests recognizing when PowerShell is the appropriate tool vs. legacy scripting options."},{"id":51,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.8","objectiveText":"Explain the basics of scripting.","title":"Scripting Risk Identification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"A junior IT technician downloaded a PowerShell script from a forum to automate workstation setup. Before running it, classify each risk concern under the correct category.\n\nRisk categories: Malware Risk, System Configuration Risk, Operational Risk, Best Practice Violation\n\nConcerns:\nA. The script was downloaded from an unverified third-party forum, not an official source\nB. The script includes registry edits that could disable Windows Defender\nC. The script has never been tested in a lab environment before being run in production\nD. Running the script without a rollback plan means there is no way to undo changes if something breaks\nE. The script includes a command to disable Windows Update\nF. The technician plans to run the script during business hours when users are active","correctAnswer":"Malware Risk: A (unverified source, could contain malicious code)\nSystem Configuration Risk: B (disabling Windows Defender), E (disabling Windows Update)\nOperational Risk: C (no testing before production), D (no rollback plan)\nBest Practice Violation: C, D, F (no testing, no rollback, running during production hours)\n\nNote: C, D, and F all overlap with Best Practice Violation since testing, rollback planning, and change windows are all best practices.","wrongAnswers":["Scenario A → System Configuration Risk — downloading from an unverified source is primarily a malware risk. The script itself might look harmless but contain embedded malicious commands.","Scenario F → Malware Risk — running during business hours is an operational/scheduling risk (disrupts users, harder to roll back if users are working), not a malware risk.","Scenario B → Operational Risk — disabling a security tool like Windows Defender is a system configuration AND security risk. The direct consequence is weakened security posture, not just an operational disruption."],"rationale":"Scripting risks are tested on the 220-1202 exam. CompTIA categorizes scripting concerns as: unintentional malware introduction (using unverified scripts), inadvertent system setting changes (registry/security tool modifications), and operational impacts (browser/system crashes from poorly tested scripts). Always test in lab first, have a rollback plan, and use verified sources."},{"id":52,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.4 / 4.5","objectiveText":"Given a scenario, use common safety procedures. Summarize environmental impacts and local environment controls.","title":"ESD Prevention Tool Matching","difficulty":"Easy","uiType":"Drag and Drop (Match)","scenario":"Match each ESD (Electrostatic Discharge) prevention tool or technique to its correct description and use case.\n\nTools/Techniques: ESD Wrist Strap, ESD Mat, Antistatic Bag, Proper Grounding, Antistatic Gloves\n\nDescriptions:\nA. A conductive surface placed on a workbench that drains static electricity from tools and components placed on it, connected to ground\nB. A metallic-lined bag used to store and transport sensitive components like RAM, GPUs, and motherboards when not installed in a system\nC. A strap worn on the wrist that connects the technician to ground, equalizing the potential between the technician and the components they are handling\nD. Ensures the building's electrical system provides a path to earth, protecting equipment and personnel from voltage faults\nE. Worn when handling sensitive components in the field, preventing skin oils AND static discharge simultaneously","correctAnswer":"ESD Wrist Strap → C (wrist connection to ground, equalizes potential)\nESD Mat → A (conductive workbench surface, connected to ground)\nAntistatic Bag → B (storage and transport of sensitive components)\nProper Grounding → D (building electrical grounding, fault protection)\nAntistatic Gloves → E (hand protection from static AND skin oils)","wrongAnswers":["ESD Wrist Strap → A (ESD Mat) — the wrist strap goes on the technician's body. The mat is the surface under the components. These are complementary, not the same tool.","Antistatic Bag → A (ESD Mat) — antistatic bags are for transportation and storage of components, not a work surface. Placing a component on an antistatic bag does not provide the same protection as an ESD mat connected to ground.","Proper Grounding → C (Wrist Strap) — building grounding is a facility/electrical safety concept. The wrist strap is a personal protective item. Grounding the building does not substitute for wearing an ESD strap."],"rationale":"ESD prevention is directly tested on the 220-1202 exam. Critical rule: NEVER connect yourself to an electrical ground point to prevent ESD (it creates electrocution risk). Always use an ESD strap connected to a ground point on the CHASSIS or an ESD mat. Antistatic bags protect components during storage/transport."},{"id":53,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.5","objectiveText":"Summarize environmental impacts and local environment controls.","title":"Hazardous Material Disposal Identification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each disposal scenario as: Compliant Disposal (acceptable method) or Non-Compliant Disposal (violates MSDS/SDS or environmental regulations).\n\nScenarios:\nA. Used toner cartridges are sent back to the manufacturer using the provided return/recycling envelope\nB. Dead lithium-ion laptop batteries are placed in the regular office trash bin\nC. A CRT monitor is dropped off at a certified e-waste recycling facility\nD. Expired printer ink cartridges are dropped off at an office supply store with a recycling program\nE. An old UPS battery is disposed of at a local household hazardous waste collection event\nF. An old computer containing a failed hard drive is thrown in the dumpster after the OS is reinstalled","correctAnswer":"Compliant: A (manufacturer toner return), C (certified e-waste facility), D (ink cartridge recycling program), E (hazardous waste collection)\nNon-Compliant: B (Li-ion batteries in regular trash), F (computer in dumpster without proper disposal)\n\nB is non-compliant: Lithium-ion batteries contain hazardous materials and must be recycled at designated facilities. Regular trash is illegal in many jurisdictions.\nF is non-compliant: Old computers require proper e-waste disposal. Reinstalling the OS does NOT sanitize the drive — data may be recoverable. Additionally, the hardware contains hazardous materials.","wrongAnswers":["Scenario F → Compliant — Reinstalling the OS does not properly sanitize a drive. Data can often be recovered from a drive after a standard OS reinstall. The computer also contains hazardous components (lead solder, mercury in some displays, cadmium in batteries) that require proper e-waste disposal.","Scenario A → Non-Compliant — Manufacturer toner return programs are the recommended disposal method. Toner contains fine carbon particles that are hazardous if released. Manufacturer return programs are the proper channel.","Scenario B → Compliant — Li-ion batteries are classified as hazardous waste. Regular trash disposal is prohibited under RCRA in the US and similar regulations internationally."],"rationale":"Environmental disposal is tested on the 220-1202 exam. Batteries, toner, CRT monitors, and electronic waste require special disposal per MSDS/SDS documentation and environmental regulations. The exam also tests that reinstalling an OS is NOT a valid data destruction method — drives must be wiped with overwrite tools or physically destroyed."},{"id":54,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.5","objectiveText":"Summarize environmental impacts and local environment controls.","title":"Data Center Environmental Controls","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A facilities manager is setting up environmental controls for a new server room. Answer the following configuration questions.\n\nQuestion 1: What is the recommended relative humidity range for a server room to prevent both condensation and static discharge buildup?\n[ ▼ ] Options: 10-20% / 30-40% / 45-55% / 70-80%\n\nQuestion 2: A rack of servers is overheating despite adequate AC. Which airflow configuration is the correct industry standard for preventing hot/cold air mixing?\n[ ▼ ] Options: Servers face the same direction randomly / Hot aisle / cold aisle containment layout / Place servers back-to-back, front-to-front / Use only ceiling-mounted fans\n\nQuestion 3: The room experiences brief power outages lasting 2-5 seconds during storms. What device protects servers from these interruptions?\n[ ▼ ] Options: Surge suppressor only / Uninterruptible Power Supply (UPS) / Generator only / Power strip with breaker","correctAnswer":"Q1: 45-55% humidity — below 30% promotes static electricity buildup. Above 60% risks condensation on components. 45-55% is the ideal balance.\nQ2: Hot aisle / cold aisle containment — servers are arranged so cold air intakes face the cold aisles and hot air exhausts face the hot aisles. This prevents hot and cold air mixing, maximizing cooling efficiency.\nQ3: Uninterruptible Power Supply (UPS) — a UPS provides immediate battery backup for short outages (seconds to minutes) while also conditioning power. A generator takes time to start and does not cover the gap. A surge suppressor only protects against voltage spikes, not outages.","wrongAnswers":["Q1: 10-20% humidity — extremely low humidity dramatically increases static discharge risk. Server rooms at 10-20% would have frequent ESD events damaging equipment.","Q2: Servers facing random directions — random placement creates hot/cold air mixing where exhaust from one server blows directly into the intake of another, dramatically reducing cooling efficiency and causing thermal throttling.","Q3: Surge suppressor only — a surge suppressor protects against voltage spikes but provides zero protection against power loss. A UPS is the correct device for outage protection."],"rationale":"Server room environmental controls are tested on the 220-1202 exam. Key numbers: 45-55% humidity. Hot/cold aisle design is the industry standard for airflow efficiency. A UPS covers brief outages immediately (unlike a generator which requires startup time). These protect expensive server hardware and ensure uptime."},{"id":55,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.2 / 5.7","objectiveText":"Troubleshoot motherboards, RAM, CPUs, power (5.2) and wired/wireless networks (5.7).","title":"Multi-Symptom Workstation Diagnosis","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A workstation intermittently freezes, randomly restarts without warning, and the event log shows kernel power error Event ID 41 (unexpected shutdown). The freezing happens more under load (gaming, video rendering). The system is 4 years old and runs 24/7.\n\nQuestion 1: Event ID 41 with no prior software error indicates what category of failure?\n[ ▼ ] Options: Malware infection / Unexpected power loss or hardware-level crash / Driver corruption / Windows file system error\n\nQuestion 2: The symptoms worsen under load. What two components should the technician test first?\n[ ▼ ] Options: RAM and hard drive / Power supply and CPU cooling / GPU driver and Windows updates / Network card and Bluetooth\n\nQuestion 3: The technician runs HWMonitor and finds the CPU is reaching 98 degrees Celsius under load. What is the most likely root cause?\n[ ▼ ] Options: Defective CPU / Dried-out thermal paste and/or clogged CPU cooler / Insufficient RAM / Corrupted BIOS","correctAnswer":"Q1: Unexpected power loss or hardware-level crash — Event ID 41 occurs when Windows restarts without a graceful shutdown, indicating the system lost power or the hardware crashed before Windows could log an error.\nQ2: Power supply and CPU cooling — both are directly related to load-based failures. PSU voltage drops under heavy load cause sudden crashes. Thermal throttling/shutdown from inadequate cooling causes the same pattern.\nQ3: Dried-out thermal paste and/or clogged CPU cooler — 98°C is critically hot (Intel/AMD throttle and emergency shutdown at ~100°C). After 4 years of 24/7 use, thermal paste dries and loses effectiveness, and heat sinks accumulate dust. Reapplying thermal paste and cleaning the cooler typically resolves this.","wrongAnswers":["Q1: Malware infection — malware can cause instability, but Event ID 41 specifically indicates the system was abruptly cut off from power rather than a software-level crash (which would generate a different stop error first).","Q2: GPU driver and Windows updates — driver issues typically produce BSODs with specific stop codes. The load-based pattern combined with Event ID 41 points to power delivery or thermal management, not software.","Q3: Defective CPU — CPUs rarely fail outright. A 4-year-old system reaching 98°C under load is almost always a thermal management issue (dried paste, blocked airflow) rather than a defective chip."],"rationale":"Event ID 41 is a critical Windows log entry indicating hardware-level unexpected shutdown. Load-based instability narrows the cause to power delivery (PSU) or thermal management (CPU cooling). 98°C indicates imminent thermal shutdown. The fix is usually thermal paste replacement and cooler cleaning, which is a regular maintenance task on aging systems."},{"id":56,"exam":"220-1201","domain":"2.0 Networking","objective":"2.6 / 2.7","objectiveText":"Compare and contrast common network configuration concepts and internet connection types.","title":"SOHO Network Configuration Scenario","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A small office has a SOHO router, 8 wired workstations, 2 wireless printers, and a NAS device that should be accessible from outside the office. The ISP provides a dynamic public IP address.\n\nQuestion 1: The NAS needs to be accessible from the internet. Since the ISP assigns a new IP address periodically, what service should be configured?\n[ ▼ ] Options: Static IP from ISP (costs extra) only / Dynamic DNS (DDNS) service / MAC address filtering / NAT loopback only\n\nQuestion 2: To allow inbound internet traffic to reach the NAS on port 443, what must be configured on the SOHO router?\n[ ▼ ] Options: DHCP reservation / Port forwarding / MAC address filtering / Wi-Fi Protected Setup (WPS)\n\nQuestion 3: The office manager wants to prevent the wireless printers from communicating with the workstations directly (only through the router). Which wireless router feature accomplishes this?\n[ ▼ ] Options: WPA3 encryption / AP Isolation (Client Isolation) / Port forwarding / SSID broadcasting disabled","correctAnswer":"Q1: Dynamic DNS (DDNS) — DDNS services (such as No-IP or DynDNS) automatically update a hostname record whenever the public IP address changes. This gives the NAS a consistent hostname like office.ddns.net even when the IP changes.\nQ2: Port forwarding — port forwarding on the router maps external port 443 to the NAS's internal IP address, allowing inbound connections from the internet to reach the internal device.\nQ3: AP Isolation (Client Isolation) — this wireless feature prevents wireless clients from communicating directly with each other on the same Wi-Fi network. Printers can still communicate through the router but cannot talk directly to other wireless devices.","wrongAnswers":["Q1: Static IP only — a static IP from the ISP would work but often costs significantly more monthly. DDNS solves the same problem with no ISP cost.","Q2: DHCP reservation — DHCP reservation gives the NAS a consistent internal IP address. This is good practice alongside port forwarding, but alone it does not enable inbound internet access.","Q3: WPA3 encryption — WPA3 encrypts wireless traffic between clients and the AP. It does not prevent client-to-client direct communication on the same network."],"rationale":"SOHO network configuration tests multiple networking concepts together. DDNS solves dynamic IP addressing for remote access. Port forwarding opens specific ports through the router's NAT. AP isolation is a wireless security feature that prevents lateral movement between wireless devices. These often appear together on the exam as integrated scenarios."},{"id":57,"exam":"220-1202","domain":"2.0 Security","objective":"2.1 / 2.2","objectiveText":"Physical security measures and Windows OS security settings.","title":"Physical Security Control Matching","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each physical security control to the threat it is primarily designed to mitigate.\n\nSecurity controls: Mantrap / Airlock, Badge/Key Card Access Control, Cable Lock (Kensington lock), Privacy Screen / Screen Filter, Biometric Door Lock, Security Camera (CCTV), Visitor Log\n\nThreats to mitigate:\nA. An unauthorized person following an authorized employee through a secured door\nB. Theft of a laptop from an unsecured desk in a shared workspace\nC. A shoulder surfer reading sensitive data from a monitor in a public area\nD. An unauthorized person walking into a secured area without any credential verification\nE. Disputed access events with no record of who entered a facility and when\nF. Impersonation — someone entering with a stolen access badge since they look similar\nG. After-hours review of who was present in a facility during a security incident","correctAnswer":"Mantrap/Airlock → A (prevents tailgating by requiring one door to close before the next opens, trapping unauthorized followers)\nCable Lock → B (physically secures laptop to desk, prevents grab-and-run theft)\nPrivacy Screen → C (limits viewing angles so only the person directly in front can see the screen)\nBadge/Key Card Access → D (requires valid credential to open door, denies access without authentication)\nVisitor Log → E (creates a paper/digital record of who entered and when)\nBiometric Lock → F (uses unique physical characteristic, cannot be shared or stolen like a badge)\nSecurity Camera (CCTV) → G (provides recorded evidence for post-incident review)","wrongAnswers":["Badge/Key Card → A (tailgating) — key card systems do not prevent tailgating because an authorized person can hold the door for someone behind them. The mantrap/airlock is specifically designed to address this by physically preventing two people from passing through simultaneously.","Visitor Log → F (impersonation) — a visitor log records presence but does not verify identity against a physical characteristic. Biometrics are needed to prevent impersonation since they cannot be shared.","Security Camera → A (tailgating) — cameras detect and record tailgating after the fact but do not physically prevent it. The mantrap physically enforces one-at-a-time access."],"rationale":"Physical security controls are tested on the 220-1202 exam. Key distinction: mantraps prevent tailgating (cameras detect but don't prevent it). Biometrics prevent badge sharing/impersonation. Cable locks prevent opportunistic laptop theft. Privacy screens prevent visual eavesdropping. Each control addresses a specific threat vector."},{"id":58,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.2","objectiveText":"Given a scenario, troubleshoot common personal computer security issues.","title":"Ransomware Incident Response Ordering","difficulty":"Hard","uiType":"Drag and Drop (Order Steps)","scenario":"A user calls IT saying all files on their workstation have been renamed with a .locked extension and a ransom note appeared on the desktop. Put the incident response steps in the correct order.\n\nSteps (out of order):\nA. Wipe and reimage the workstation from a known-good image\nB. Immediately disconnect the workstation from the network (unplug the Ethernet cable or disable Wi-Fi)\nC. Restore affected files from the most recent clean backup\nD. Identify the ransomware variant and check for a free decryption tool (e.g., via nomoreransom.org)\nE. Notify IT security management and document the incident\nF. Scan the backup for infection before restoring, to ensure the backup is clean\nG. Verify the restored workstation is fully functional and reconnect to the network\nH. Conduct a post-incident review and update security controls to prevent recurrence","correctAnswer":"Correct order: B, E, D, A, F, C, G, H\n\n1. B - Disconnect from network immediately (contain the infection, prevent spread and ransomware C2 communication)\n2. E - Notify management and document (incident management process)\n3. D - Check for free decryption tool (may save significant effort if one exists)\n4. A - Wipe and reimage (remove the infection completely; do not try to clean in place)\n5. F - Scan the backup before restoring (confirm backup is not also infected)\n6. C - Restore files from backup\n7. G - Verify and reconnect\n8. H - Post-incident review","wrongAnswers":["Paying the ransom as step 3 — CompTIA and security organizations recommend against paying ransoms. There is no guarantee of receiving a working decryption key, and payment funds criminal operations.","Restoring from backup (C) before scanning the backup (F) — restoring a backup that is also infected would immediately re-encrypt the system. Always scan the backup first.","Reconnecting to the network (G) before reimaging (A) — an infected machine should never be reconnected to the network. The infection must be completely removed first."],"rationale":"Ransomware response requires immediate network isolation to prevent lateral spread. Document and notify management per incident response policy. Check nomoreransom.org before paying or wiping. Wipe and reimage (do not try to disinfect in place — ransomware leaves traces). Verify backup cleanliness before restoring. Post-incident review closes the loop."},{"id":59,"exam":"220-1202","domain":"2.0 Security","objective":"2.6","objectiveText":"Given a scenario, configure a workstation to meet best practices for security.","title":"Workstation Security Hardening Checklist","difficulty":"Hard","uiType":"Drag and Drop (Categorize)","scenario":"A new Windows 11 workstation needs to be hardened before deployment. Categorize each action as a Required Security Step (must do) or an Unnecessary/Counterproductive Action (should not do).\n\nActions:\nA. Enable BitLocker full-disk encryption\nB. Disable the Guest account\nC. Disable Windows Defender to improve performance\nD. Configure screen lock to activate after 10 minutes of inactivity\nE. Set a minimum password length of 8 characters and require complexity\nF. Enable the built-in Administrator account with a blank password for IT convenience\nG. Apply all available Windows security updates before deployment\nH. Disable AutoRun/AutoPlay for removable media\nI. Disable Windows Firewall to avoid blocking user applications\nJ. Enable audit logging for logon events and policy changes","correctAnswer":"Required Security Steps: A, B, D, E, G, H, J\n  A - BitLocker (protects data if device is stolen)\n  B - Disable Guest (removes unnecessary access path)\n  D - Screen lock (prevents unauthorized access when unattended)\n  E - Password policy (enforces credential strength)\n  G - Windows Updates (patches known vulnerabilities)\n  H - Disable AutoRun (prevents malware from running automatically from USB)\n  J - Audit logging (provides accountability and forensic trail)\n\nUnnecessary/Counterproductive: C, F, I\n  C - Disabling Windows Defender removes real-time malware protection\n  F - Enabling Administrator with blank password creates a critical security vulnerability\n  I - Disabling Windows Firewall removes a key layer of network protection","wrongAnswers":["Disabling Windows Defender (C) as a Required Step — Defender is Windows' built-in real-time protection. Disabling it 'for performance' is a common misconception. Modern Defender has minimal performance impact and must remain enabled.","Disabling Windows Firewall (I) as Required — the Windows Firewall provides inbound/outbound traffic filtering. Disabling it 'to avoid blocking apps' creates unnecessary exposure. Applications can be granted exceptions without disabling the firewall entirely.","Enabling Administrator with blank password (F) as Required — this creates the exact type of vulnerability that attackers look for. The built-in Administrator account should remain disabled (default in Windows 10/11) or be given a strong, unique password."],"rationale":"Workstation hardening is a core 220-1202 skill. Key rules: disable Guest and built-in Admin accounts (or give them strong passwords), enable BitLocker for data-at-rest protection, keep Defender and Firewall enabled, disable AutoRun to prevent USB malware, enforce password complexity, and keep systems patched. These are all part of the security baseline."},{"id":60,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.2","objectiveText":"Explain the importance of prohibited content/activity and privacy, licensing, and policy concepts.","title":"Data Destruction Method Selection","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A company is decommissioning old workstations that contained HIPAA-regulated patient health data. The IT team must select the appropriate data destruction method for each device.\n\nQuestion 1: A 256 GB SSD that needs to be reused internally needs its data destroyed. What is the most appropriate method?\n[ ▼ ] Options: Standard format / ATA Secure Erase or manufacturer's cryptographic erase / Simply reinstall Windows / Delete all files and empty Recycle Bin\n\nQuestion 2: A mechanical hard drive that will be physically discarded (not reused). What method guarantees data is unrecoverable?\n[ ▼ ] Options: 1-pass overwrite with zeros / 7-pass DoD 5220.22-M overwrite or physical shredding/degaussing / Standard quick format / Encrypt the drive then delete the encryption key\n\nQuestion 3: What documentation must accompany the destruction of HIPAA-regulated media to demonstrate compliance?\n[ ▼ ] Options: Nothing is required / A Certificate of Destruction from the disposal vendor / A verbal confirmation from the IT manager / An email to the help desk","correctAnswer":"Q1: ATA Secure Erase or manufacturer's cryptographic erase — SSDs cannot be reliably wiped with traditional multi-pass overwrites because of wear leveling. The manufacturer's secure erase command or cryptographic erase (erasing the encryption key, rendering data unrecoverable) is the proper method.\nQ2: Physical shredding/degaussing (or DoD-level overwrite for drives being retained) — for discarded drives, physical destruction (shredding, drilling, degaussing) guarantees no recovery. For HIPAA data, physical destruction is often preferred for drives not being reused.\nQ3: Certificate of Destruction — HIPAA and other regulations require documented proof that media was properly destroyed. A Certificate of Destruction from a certified vendor provides the audit trail required for compliance.","wrongAnswers":["Q1: Standard format — formatting an SSD does not erase data; it only removes the file index. The underlying data remains on the NAND chips and can be recovered with forensic tools.","Q2: 1-pass overwrite — for HIPAA-regulated data being discarded, a single-pass overwrite is generally insufficient. DoD standards (at minimum), physical destruction, or degaussing are required for sensitive data on drives that will leave the organization's control.","Q3: Email to help desk — informal internal communication is not an acceptable compliance record. HIPAA requires formal documentation from certified destruction vendors with a chain-of-custody paper trail."],"rationale":"Data destruction for regulated data is tested on the 220-1202 exam. SSDs require cryptographic erase or secure erase commands, not traditional overwrites. HDDs can be overwritten to DoD standards or physically destroyed. HIPAA requires a Certificate of Destruction. Simply deleting files or formatting drives does not destroy data."},{"id":61,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.7","objectiveText":"Given a scenario, install and replace laptop hardware and components.","title":"Laptop Component Upgrade Path","difficulty":"Hard","uiType":"Radio Button","scenario":"A user has a 3-year-old business laptop with the following specs: Intel Core i5 8th Gen, 8 GB DDR4 LPDDR4 RAM (soldered to motherboard), 256 GB SATA M.2 SSD, integrated Intel UHD graphics. The user reports sluggish performance when running multiple video calls alongside document editing.\n\nAfter running Windows Task Manager, the technician sees: CPU usage averaging 45%, RAM usage consistently at 92-100%, and SSD read/write at 5%.\n\nWhich upgrade would have the greatest performance impact for this user's specific workload?\n\nO Replace the CPU with a newer generation\nO Add a discrete GPU\nO Upgrade the SSD to an NVMe drive\nO Upgrade the RAM — however, if soldered, explore external options or accept it cannot be done\nO Reinstall the operating system","correctAnswer":"Upgrade the RAM — however, the RAM is LPDDR4 soldered to the motherboard.\n\nThe Task Manager data clearly shows the bottleneck: RAM is at 92-100% while CPU and SSD are not saturated. The correct answer is RAM upgrade. However, LPDDR4 memory is soldered in many thin-and-light laptops and cannot be upgraded.\n\nThe full correct answer on the exam: RAM is the bottleneck. If it is soldered, the laptop cannot be upgraded and the user would need a new device with more RAM. The technician should confirm whether the RAM is soldered before telling the customer an upgrade is possible.","wrongAnswers":["Upgrade the SSD to NVMe — SSD usage is at 5%, meaning it is not the bottleneck. Upgrading a non-bottlenecked component will not improve performance for this workload.","Add a discrete GPU — video calls use the CPU and RAM, not the GPU significantly. The Task Manager data shows CPU is not the bottleneck. A GPU upgrade would not improve performance for this workload.","Replace the CPU — CPU usage is at only 45%, which is not the bottleneck. CPU upgrades in laptops are also almost never possible due to BGA (Ball Grid Array) soldered CPUs in modern thin laptops."],"rationale":"Performance diagnosis requires reading the actual bottleneck from Task Manager data. 92-100% RAM utilization is the clear constraint here. The exam tests whether students can read performance data and identify the correct component to upgrade, not just guess. The soldered RAM caveat tests knowledge of modern laptop component accessibility."},{"id":62,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.7","objectiveText":"Given a scenario, configure Microsoft Windows networking features on a client/desktop.","title":"Windows Network Drive Mapping","difficulty":"Medium","uiType":"Command Prompt / Terminal","scenario":"A user needs to access a shared folder called \"Projects\" on a file server named \"FS01\" on the company network. The share path is \\\\FS01\\Projects. The IT department wants this drive to automatically reconnect every time the user logs in and assigns it the letter Z:.\n\nType the Windows command-line command that maps this network share to drive letter Z: and reconnects it automatically at logon.","correctAnswer":"net use Z: \\\\FS01\\Projects /persistent:yes\n\nBreakdown:\nnet use = command to manage network connections\nZ: = drive letter to assign\n\\\\FS01\\Projects = UNC path to the shared folder\n/persistent:yes = reconnects automatically at every logon\n\nIf the share requires different credentials: net use Z: \\\\FS01\\Projects /user:DOMAIN\\username password /persistent:yes","wrongAnswers":["net use Z: FS01/Projects — UNC paths use backslashes (\\\\server\\share), not forward slashes. This command would fail.","net use Z: \\\\FS01\\Projects — this maps the drive but without /persistent:yes it will not reconnect after logout/reboot. The requirement specifically states automatic reconnection at logon.","map Z: \\\\FS01\\Projects — 'map' is not a valid Windows command. The correct command is 'net use'."],"rationale":"Network drive mapping via net use is tested on the 220-1202 exam. The UNC path format is \\\\server\\sharename (double backslash before server name). The /persistent:yes flag is required for automatic reconnection at logon. Without it, the mapping works for the current session only."},{"id":63,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.1","objectiveText":"Given a scenario, troubleshoot common Windows OS problems.","title":"Windows Recovery Environment Options","difficulty":"Hard","uiType":"Drag and Drop (Match)","scenario":"A technician is using the Windows Recovery Environment (WinRE) to troubleshoot a workstation that cannot boot into Windows. Match each recovery scenario to the correct WinRE tool or option.\n\nRecovery tools: Startup Repair, System Restore, Command Prompt (within WinRE), Reset This PC (Keep my files), Reset This PC (Remove everything), System Image Recovery\n\nScenarios:\nA. The technician needs to run sfc /scannow and bootrec /fixmbr but Windows won't boot to a normal prompt\nB. Windows was working fine until a driver update yesterday; the technician wants to roll back to before that update\nC. Windows startup files are corrupted and bootmgr is missing; the technician wants Windows to automatically diagnose and fix the boot sequence\nD. A user's personal files are intact but Windows is severely broken; they want to reinstall Windows but keep their documents and photos\nE. A heavily infected workstation needs to be completely wiped and Windows reinstalled with no user data retained\nF. A server has a complete backup image taken last Tuesday; the admin wants to restore the entire system to that exact state","correctAnswer":"A → Command Prompt (within WinRE) — provides full CLI access for manual repair commands when Windows cannot boot\nB → System Restore — rolls back system files, registry, and drivers to a previous restore point\nC → Startup Repair — automatically diagnoses and fixes common boot issues including missing bootmgr and BCD errors\nD → Reset This PC (Keep my files) — reinstalls Windows while preserving user files in their profile folders\nE → Reset This PC (Remove everything) — completely wipes and reinstalls Windows, no data retained\nF → System Image Recovery — restores the entire system from a previously captured Windows image file","wrongAnswers":["Scenario C → System Restore — System Restore rolls back to a restore point but cannot fix missing boot files or a broken MBR. Startup Repair specifically targets the boot sequence.","Scenario B → Reset This PC (Keep my files) — this reinstalls Windows entirely. System Restore is the targeted, minimal-impact option that reverses recent changes while leaving the rest of the system intact.","Scenario F → Startup Repair — System Image Recovery restores from a full backup image. Startup Repair only addresses boot sequence issues and cannot restore an entire system from a backup."],"rationale":"Windows Recovery Environment tools each serve distinct purposes. Startup Repair fixes boot sequence. System Restore undoes recent changes. Command Prompt enables manual repair. Reset (Keep files) reinstalls Windows while preserving data. Reset (Remove everything) is a full wipe. System Image Recovery restores from a backup image. The exam tests selecting the right tool for a given scenario."},{"id":64,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.9","objectiveText":"Given a scenario, use remote access technologies.","title":"Remote Access Technology Selection","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each remote access scenario to the most appropriate technology.\n\nTechnologies: RDP (Remote Desktop Protocol), VNC (Virtual Network Computing), SSH (Secure Shell), VPN (Virtual Private Network), TeamViewer/Remote Assistance, MSRA (Microsoft Remote Assistance)\n\nScenarios:\nA. A Windows system administrator needs to manage a Windows Server 2022 GUI remotely from their Windows 11 workstation with full graphical desktop access\nB. A Linux server administrator needs to manage a headless Linux server remotely using the command line only; security is critical\nC. A help desk technician needs to remotely view and control an end user's desktop to assist them with an issue, with the user watching and able to reclaim control\nD. A remote worker needs to securely access internal company file shares, printers, and applications as if they were physically in the office\nE. A technician needs to connect to a Mac running macOS to assist a remote user, connecting cross-platform from a Windows workstation","correctAnswer":"A → RDP (Remote Desktop Protocol) — Microsoft's native protocol for full GUI remote access to Windows systems; built into Windows, uses TCP/3389\nB → SSH (Secure Shell) — encrypted command-line access to Linux servers; TCP/22; industry standard for headless server management\nC → MSRA (Microsoft Remote Assistance) or TeamViewer — designed specifically for help desk support where the end user is present and can observe/reclaim control\nD → VPN (Virtual Private Network) — extends the private network to the remote user, giving them access to network resources as if on-site\nE → VNC or TeamViewer — cross-platform remote access that works across different operating systems","wrongAnswers":["Scenario A → VNC — VNC works on Windows but RDP is the native, preferred protocol. RDP provides better compression, audio redirection, and clipboard integration on Windows.","Scenario B → RDP — RDP requires a graphical desktop environment and is Windows-primary. SSH is the correct tool for headless Linux server CLI management.","Scenario D → RDP — RDP provides remote desktop access to one machine. A VPN gives network-level access to all resources. The scenario requires access to file shares, printers, AND applications — that requires VPN, not a direct desktop connection."],"rationale":"Remote access technologies are tested on the 220-1202 exam. RDP = Windows GUI remote control (port 3389). SSH = encrypted CLI, primarily Linux (port 22). VNC = cross-platform GUI, less efficient than RDP. VPN = network-level access to all resources. MSRA/TeamViewer = user-assisted support sessions. Each has distinct use cases."},{"id":65,"exam":"220-1201","domain":"2.0 Networking","objective":"2.3","objectiveText":"Summarize services provided by networked hosts.","title":"Network Service Role Matching","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each network service role to its correct function and typical port or protocol.\n\nNetwork services: DNS Server, DHCP Server, Syslog Server, AAA Server (RADIUS), NTP Server, Proxy Server, Load Balancer, Spam Gateway\n\nFunctions:\nA. Automatically assigns IP addresses, subnet masks, default gateways, and DNS server addresses to clients on a network\nB. Translates human-readable domain names (like google.com) into IP addresses\nC. Distributes incoming network traffic across multiple servers to prevent any single server from being overwhelmed\nD. Centralizes log messages from network devices, servers, and security appliances for monitoring and analysis\nE. Intercepts outbound web requests on behalf of clients, caching content and filtering access\nF. Handles Authentication, Authorization, and Accounting for network access (used with 802.1X wireless)\nG. Synchronizes the clocks of all devices on a network to a standard time source\nH. Filters incoming email to identify and block junk mail before it reaches users","correctAnswer":"DHCP Server → A (auto IP assignment, UDP 67/68)\nDNS Server → B (name to IP resolution, UDP/TCP 53)\nLoad Balancer → C (distributes traffic across servers)\nSyslog Server → D (centralized log collection, UDP 514)\nProxy Server → E (web request interception, caching, filtering)\nAAA Server (RADIUS) → F (authentication/authorization for network access, UDP 1812/1813)\nNTP Server → G (clock synchronization, UDP 123)\nSpam Gateway → H (email filtering before delivery)","wrongAnswers":["DNS → A (DHCP) — DNS translates names to IP addresses. DHCP assigns IP configuration automatically. Both are essential, but they perform completely different functions.","Proxy Server → C (Load Balancer) — a proxy intercepts client requests and acts on their behalf. A load balancer distributes traffic to backend servers. A reverse proxy can have load balancer characteristics but they are distinct roles.","AAA → D (Syslog) — RADIUS handles authentication decisions (who can access the network). Syslog collects log data from devices. Both are infrastructure services but serve completely different purposes."],"rationale":"Network service roles are tested heavily on the 220-1201 exam. Key associations: DHCP=IP assignment (UDP 67/68), DNS=name resolution (UDP/TCP 53), NTP=time sync (UDP 123), Syslog=log aggregation (UDP 514), RADIUS=AAA for network access (UDP 1812), Proxy=web filtering/caching, Load balancer=traffic distribution, Spam gateway=email filtering."},{"id":66,"exam":"220-1202","domain":"2.0 S
