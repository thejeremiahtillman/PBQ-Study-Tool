ecurity","objective":"2.11","objectiveText":"Given a scenario, configure relevant security settings in a browser.","title":"Browser Security Feature Classification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each browser security action as either a Protective Measure (should be enabled/done) or a Security Risk (creates vulnerability or should be avoided).\n\nActions:\nA. Installing a browser extension from a random third-party website not listed in the official extension store\nB. Enabling the browser's built-in pop-up blocker\nC. Using a password manager integrated into the browser to generate and store unique passwords per site\nD. Clicking \"Proceed anyway\" when the browser displays an invalid SSL certificate warning\nE. Enabling private/incognito browsing mode when troubleshooting or testing website behavior\nF. Downloading a browser installation file from a torrent site instead of the official vendor website\nG. Using hash verification to confirm a downloaded browser installer matches the vendor's published hash\nH. Keeping the browser automatically updated to the latest version","correctAnswer":"Protective Measures: B, C, E, G, H\n  B - Pop-up blocker prevents malicious notification windows\n  C - Password manager generates unique, strong passwords per site\n  E - Private browsing avoids storing session data; useful for testing\n  G - Hash verification confirms the installer is authentic and unmodified\n  H - Updates patch security vulnerabilities\n\nSecurity Risks: A, D, F\n  A - Third-party extension sites bypass vetting; major attack vector\n  D - Proceeding past a certificate warning exposes you to MITM attacks\n  F - Torrented installers are frequently bundled with malware","wrongAnswers":["Private browsing (E) as a Security Risk — private/incognito mode is a legitimate tool. It prevents local storage of history and cache but does not provide network anonymity. It is appropriate for troubleshooting.","Automatic updates (H) as a Security Risk — keeping software updated is a fundamental security practice. Outdated browsers are among the top attack vectors.","Certificate warning (D) as Protective — clicking through certificate warnings is specifically dangerous because it disables TLS validation, opening the connection to man-in-the-middle attacks."],"rationale":"Browser security is tested on the 220-1202 exam across several behaviors: extension sources (official stores only), certificate warnings (never bypass), hash verification for downloads, pop-up blockers, and keeping browsers updated. The browser is the largest attack surface for end users."},{"id":67,"exam":"220-1202","domain":"2.0 Security","objective":"2.11","objectiveText":"Given a scenario, configure relevant security settings in a browser.","title":"SSL Certificate Warning Diagnosis","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A user calls the help desk saying their browser is displaying a security warning when trying to access the company's internal HR portal: \"Your connection is not private — NET::ERR_CERT_DATE_INVALID.\"\n\nQuestion 1: What does this specific error code indicate about the certificate?\n[ ▼ ] Options: The certificate was revoked by the CA / The certificate has expired or the system clock is incorrect / The domain name on the certificate does not match / The certificate authority is untrusted\n\nQuestion 2: The technician remotely checks the workstation and finds the system date is set to January 1, 2019. What should the technician correct first?\n[ ▼ ] Options: Reinstall the browser / Update the system date and time to the current date / Buy a new SSL certificate / Disable HTTPS for the internal portal\n\nQuestion 3: After fixing the clock, the user still gets a different certificate warning: \"NET::ERR_CERT_AUTHORITY_INVALID.\" What does this mean?\n[ ▼ ] Options: The certificate has expired again / The certificate was issued by a CA that the browser does not trust / The website is offline / The user needs to clear their cookies","correctAnswer":"Q1: The certificate has expired OR the system clock is incorrect — ERR_CERT_DATE_INVALID means the browser cannot validate the certificate's validity period. Either the cert is actually expired or the client's date/time is wrong, making a valid cert appear invalid.\nQ2: Update the system date and time — an incorrect system clock is the most common cause of false certificate date errors. The CMOS battery may be failing if the clock keeps resetting.\nQ3: The certificate was issued by a CA the browser does not trust — ERR_CERT_AUTHORITY_INVALID means the signing certificate authority is not in the browser's trusted root store. For internal portals, the company's internal CA root certificate must be installed in the workstation's trust store.","wrongAnswers":["Q1: Domain name mismatch — a name mismatch produces ERR_CERT_COMMON_NAME_INVALID, not ERR_CERT_DATE_INVALID. Each certificate error code points to a specific issue.","Q2: Reinstall the browser — a certificate date error caused by a wrong system clock is a system-level issue, not a browser problem. Reinstalling the browser would not fix an incorrect date.","Q3: The certificate expired — expiration produces ERR_CERT_DATE_INVALID. ERR_CERT_AUTHORITY_INVALID specifically means the issuing CA is not trusted, which is a separate and distinct problem."],"rationale":"Certificate error codes each indicate a specific problem. ERR_CERT_DATE_INVALID = date/time mismatch or expiration. ERR_CERT_AUTHORITY_INVALID = untrusted CA (common with internal corporate CAs). ERR_CERT_COMMON_NAME_INVALID = domain mismatch. The technician must diagnose the correct issue before attempting a fix."},{"id":68,"exam":"220-1202","domain":"2.0 Security","objective":"2.11","objectiveText":"Given a scenario, configure relevant security settings in a browser.","title":"Browser Privacy Mode and Data Clearing","difficulty":"Easy","uiType":"Drag and Drop (Match)","scenario":"Match each browser privacy scenario to the correct tool or action.\n\nScenarios:\nA. A user wants to browse a competitor's website for research without the session being saved to their browsing history\nB. A user's browser is loading an old version of a webpage despite the website being updated; images and layout look wrong\nC. A user wants all their bookmarks, saved passwords, and extensions to automatically appear on their new work laptop\nD. A technician suspects a malicious browser extension is redirecting web searches; they want to remove it\nE. A user on a shared kiosk computer wants to ensure no login cookies remain after their session\n\nBrowser tools/actions: Private/Incognito Mode, Clear Cache, Browser Sync (Sign-in), Extension Manager (disable/remove), Clear Cookies and Site Data","correctAnswer":"A → Private/Incognito Mode (session not saved to history; closes cleanly)\nB → Clear Cache (cached page data is stale; clearing forces fresh download from server)\nC → Browser Sync / Sign-in (signs user into browser account, syncing bookmarks, passwords, extensions across devices)\nD → Extension Manager (access via browser settings to identify and remove suspicious extensions)\nE → Clear Cookies and Site Data (removes authentication cookies, session tokens, and stored login state)","wrongAnswers":["Scenario B → Clear Cookies — cookies store session and authentication data. Stale cached images and layout are a cache problem, not a cookie problem. Clearing cookies would log the user out unnecessarily.","Scenario A → Clear Cache — clearing cache fixes stale content issues but does not prevent the current session from being recorded in history. Private mode is the correct tool for session privacy.","Scenario E → Private Mode — private mode prevents new data from being stored during the session, but it does not remove existing cookies or login sessions that were established before entering private mode."],"rationale":"Browser privacy tools serve distinct purposes. Private/Incognito mode prevents recording the current session. Clearing cache fixes stale content. Clearing cookies removes session state. Browser sync shares data across devices. The extension manager manages plugins. The exam tests knowing which tool addresses which specific problem."},{"id":69,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.1","objectiveText":"Given a scenario, implement best practices associated with documentation and support systems.","title":"Support Ticket Documentation Elements","difficulty":"Easy","uiType":"Drag and Drop (Categorize)","scenario":"A help desk technician is creating a support ticket after helping a user whose workstation could not connect to the network. Sort each piece of information into the correct ticket section.\n\nTicket sections: User/Device Information, Problem Description, Progress Notes / Actions Taken, Resolution\n\nInformation items:\nA. User: Maria Chen, Extension 4421, Department: Accounting\nB. Device: Dell OptiPlex 7090, Asset Tag #A1042, Windows 11\nC. \"Network cable was unplugged from the back of the workstation. Reconnected cable. Issue resolved.\"\nD. \"User reports workstation cannot connect to the internet or network drives since this morning\"\nE. \"Checked Device Manager: no errors. Ran ipconfig: 169.254.x.x APIPA address. Pinged gateway: failed.\"\nF. Severity: Medium, Category: Network Connectivity","correctAnswer":"User/Device Information: A, B (who and what device)\nProblem Description: D, F (what the problem is and its severity/category)\nProgress Notes / Actions Taken: E (what the technician did to investigate)\nResolution: C (what fixed it and confirmation it works)","wrongAnswers":["Resolution: E — progress notes document investigation steps. The resolution is what actually fixed the issue. Mixing investigation steps into the resolution section makes it harder to build a searchable knowledge base.","Problem Description: C — the resolution belongs in its own field, not in the problem description. The problem description captures what the user reported, not what was done to fix it.","Progress Notes: A — user and device information is structured data captured in dedicated fields. It should not be embedded in free-text progress notes where it cannot be searched or filtered by asset."],"rationale":"Proper ticket documentation is tested on the 220-1202 exam. Good tickets include: who (user/device info), what happened (problem description), what was done (progress notes), and how it was fixed (resolution). This structure enables knowledge base search, trend analysis, and asset tracking."},{"id":70,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.1","objectiveText":"Given a scenario, implement best practices associated with documentation and support systems.","title":"Document Type Identification","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each document description to its correct document type.\n\nDocument types: Standard Operating Procedure (SOP), Incident Report, Network Diagram, Knowledge Base Article, Acceptable Use Policy (AUP), Asset Inventory / CMDB, On-boarding Checklist\n\nDescriptions:\nA. A visual map showing how all switches, routers, servers, and workstations are connected in the office network\nB. A formal policy employees must acknowledge that defines what is and is not permitted on company computers and networks\nC. A document a new employee completes with IT during their first day, covering account creation, hardware assignment, and policy signing\nD. A step-by-step guide describing exactly how to perform a specific IT task such as configuring a new workstation or resetting a password\nE. A record of every IT asset in the organization with make, model, serial number, assigned user, and location\nF. A searchable document describing a previously solved problem and its resolution, used by other technicians to solve similar issues\nG. Formal documentation created after a security event detailing what happened, its impact, how it was contained, and lessons learned","correctAnswer":"A → Network Diagram\nB → Acceptable Use Policy (AUP)\nC → On-boarding Checklist\nD → Standard Operating Procedure (SOP)\nE → Asset Inventory / CMDB (Configuration Management Database)\nF → Knowledge Base Article\nG → Incident Report","wrongAnswers":["SOP vs. Knowledge Base Article — an SOP is prescriptive (how to do a task). A knowledge base article is descriptive (here is a problem we solved; here is how). Both involve documented procedures, but SOPs are formal, repeatable process definitions while KB articles are reactive problem/solution records.","Incident Report → SOP — incident reports document what went wrong and the response. SOPs document routine procedures. An incident report is reactive; an SOP is proactive.","AUP → SOP — an AUP is a policy document employees acknowledge. It defines permitted behavior. An SOP is a procedural guide for technical tasks."],"rationale":"Documentation types are directly tested on the 220-1202 exam. Each type has a specific purpose: SOPs define how to do things, KB articles record solved problems, AUPs define allowed use, on-boarding checklists guide new hire setup, incident reports document security events, and CMDBs track assets."},{"id":71,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.6","objectiveText":"Explain the importance of prohibited content/activity and privacy, licensing, and policy concepts.","title":"Order of Volatility for Evidence Collection","difficulty":"Hard","uiType":"Drag and Drop (Order Steps)","scenario":"A suspected insider threat incident has been identified on a workstation. The security team must collect digital evidence. Arrange the data sources in the correct order of collection — from most volatile (collected first, disappears fastest) to least volatile (collected last, persists longest).\n\nData sources (out of order):\nA. Contents of RAM (running processes, open network connections, encryption keys in memory)\nB. Data on the local hard drive / SSD\nC. CPU cache and CPU registers\nD. Network traffic captures currently flowing through the NIC\nE. Virtual memory / paging file on disk\nF. Removable media (USB drives, external hard drives attached to the system)\nG. Archived/backup data stored on a remote server\nH. Temporary file system data (temp folders, swap files)","correctAnswer":"Most volatile → Least volatile:\n1. C - CPU cache and registers (cleared on every clock cycle; lost immediately on power-off)\n2. A - RAM contents (lost immediately when power is removed; must be captured live)\n3. D - Network traffic (packets in transit are gone in milliseconds; must be captured live)\n4. H - Temporary files / swap (session-based, cleared on reboot)\n5. E - Virtual memory / paging file (disk-based but ephemeral; may be overwritten)\n6. B - Local hard drive / SSD (persistent but could be overwritten; capture early)\n7. F - Removable media (persistent, but physically removable)\n8. G - Remote backup/archive (most stable; persists independently of the local system)","wrongAnswers":["Hard drive before RAM — RAM is far more volatile than a hard drive. RAM content is completely lost when power is removed. Collecting the hard drive before capturing RAM means volatile evidence is lost.","Remote backups before local drives — remote backups are the most stable data source and will persist. Local hard drive data could be overwritten or destroyed, so it takes priority over remote archives.","Network traffic last — network traffic is actively flowing and packets are gone in milliseconds. It must be captured with a live network tap or packet capture tool immediately, before any other disk-based evidence."],"rationale":"Order of volatility is directly tested on the 220-1202 exam. Evidence must be collected from most volatile to least: CPU registers/cache, RAM, network traffic, temp files, virtual memory, hard drive, removable media, remote backups. Failing to collect volatile data first results in permanent evidence loss."},{"id":72,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.6","objectiveText":"Explain the importance of prohibited content/activity and privacy, licensing, and policy concepts.","title":"Chain of Custody Requirements","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A technician discovers what appears to be inappropriate content on a company-owned workstation during routine maintenance. The company's incident response policy requires chain of custody procedures.\n\nQuestion 1: What is the primary purpose of maintaining chain of custody documentation?\n[ ▼ ] Options: To speed up the investigation / To ensure evidence integrity and admissibility in legal proceedings / To notify the employee before evidence is collected / To back up the data for the employee\n\nQuestion 2: The technician needs to create a forensic copy of the hard drive. What tool or technique ensures the copy is identical to the original and can be verified?\n[ ▼ ] Options: Standard Windows file copy / Xcopy command / Bit-for-bit imaging with hash verification (using a write blocker) / Drag-and-drop copy in File Explorer\n\nQuestion 3: Who must the technician notify immediately, before proceeding with the investigation?\n[ ▼ ] Options: The employee whose workstation it is / IT management and possibly HR or legal / The entire IT team / No one until evidence collection is complete","correctAnswer":"Q1: To ensure evidence integrity and admissibility in legal proceedings — chain of custody documents every person who handled evidence, preventing tampering claims and ensuring evidence is legally admissible.\nQ2: Bit-for-bit imaging with hash verification using a write blocker — a forensic image captures every bit of the drive including deleted data. A write blocker prevents any writes to the original drive (preserving it). Hash values (MD5/SHA) verify the copy matches the original exactly.\nQ3: IT management and possibly HR or legal — the technician should not investigate unilaterally. Management must be informed so they can involve HR, legal counsel, and law enforcement if appropriate. Acting alone can compromise the investigation.","wrongAnswers":["Q1: To speed up the investigation — chain of custody has nothing to do with speed. It is about legal admissibility and evidence integrity.","Q2: Standard Windows file copy — a standard copy only duplicates visible, allocated files. It does not copy deleted data, unallocated space, or metadata. It also cannot verify that the copy is bit-for-bit identical.","Q3: The employee — notifying the subject of an investigation before evidence is secured gives them the opportunity to destroy evidence. The employee is the last person who should be informed initially."],"rationale":"Chain of custody is a formal process ensuring evidence is collected, documented, and handled in a way that maintains its legal integrity. Write blockers prevent modification of original evidence. Hash values prove the copy matches the original. Management must be notified immediately because the IT technician cannot unilaterally investigate potential policy violations."},{"id":73,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.6","objectiveText":"Explain the importance of prohibited content/activity and privacy, licensing, and policy concepts.","title":"Software Licensing Classification","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each software licensing scenario to the correct license type.\n\nLicense types: Perpetual License, Subscription License, Personal-Use License, Corporate/Enterprise License, Open-Source License, OEM License\n\nScenarios:\nA. A company pays a one-time fee for Microsoft Office 2019 and can use it indefinitely without ongoing payments\nB. A company pays monthly for Microsoft 365 and access ends if they stop paying\nC. A user installs Notepad++ on their home PC; the software is free to use, modify, and distribute under GPL\nD. An employee installs Adobe Creative Cloud on their personal home computer using their company-issued license; the license agreement prohibits this use\nE. A large company purchases licensing rights for unlimited installations of software across all employees under a volume agreement\nF. Windows 11 Home comes pre-installed on a laptop and the license is tied to that specific hardware; it cannot be legally transferred to another computer","correctAnswer":"A → Perpetual License (one-time purchase, use forever)\nB → Subscription License (ongoing payment required; access ends when subscription lapses)\nC → Open-Source License (free to use, modify, distribute under terms like GPL)\nD → Personal-Use License (the employee is using a corporate license for personal use, which violates the license terms)\nE → Corporate/Enterprise License (volume licensing for organization-wide deployment)\nF → OEM License (tied to original hardware; non-transferable)","wrongAnswers":["Scenario B → Perpetual — perpetual licenses have a one-time cost. Subscription licenses require ongoing payments and access is time-limited. Microsoft 365 is specifically a subscription model.","Scenario F → Perpetual — OEM (Original Equipment Manufacturer) licenses are a specific type that binds the software to the hardware it shipped with. A perpetual license allows installation on different hardware within license terms.","Scenario D → Enterprise License — the scenario describes a violation of a personal-use license restriction. Enterprise licenses allow broader use within an organization, not personal home use."],"rationale":"Licensing types are tested on the 220-1202 exam. Perpetual = one-time, forever. Subscription = ongoing payment. OEM = hardware-tied. Open-source = freely modifiable under license terms (GPL, MIT, etc.). Enterprise/volume = organization-wide. Personal-use = individual only. License violations have legal and compliance consequences."},{"id":74,"exam":"220-1201","domain":"2.0 Networking","objective":"2.8","objectiveText":"Given a scenario, use networking tools.","title":"Network Technician Tool Selection","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each networking scenario to the correct tool the technician should use.\n\nTools: Cable Tester, Toner Probe / Fox and Hound, Wi-Fi Analyzer, Crimper, Punchdown Tool, Cable Stripper, Multimeter, Loopback Plug\n\nScenarios:\nA. A network cable was just assembled with RJ-45 connectors; the technician needs to verify all 8 wires are connected in the correct order and no wires are broken\nB. A technician needs to find which unlabeled port on a patch panel corresponds to the wall jack in Room 204\nC. The office Wi-Fi is slow and the IT team needs to see which channels are in use and identify neighboring network interference\nD. A new wall jack needs to be terminated by pressing individual wires into the 110-punchdown block on the back of the keystone jack\nE. A technician is finishing a custom-length patch cable and needs to attach an RJ-45 connector to the end of the cable\nF. A technician is testing whether a network port on a switch is functioning by verifying it can transmit and receive on the same port without a device connected","correctAnswer":"A → Cable Tester (verifies wire map, continuity, and pinout of assembled cables)\nB → Toner Probe / Fox and Hound (injects a tone on one end; probe detects it at the other end to identify the cable run)\nC → Wi-Fi Analyzer (shows SSIDs, signal strength, channels, and interference for wireless troubleshooting)\nD → Punchdown Tool (seats wire into 110-block connectors on keystone jacks and patch panels)\nE → Crimper (attaches RJ-45 connectors to the end of cable)\nF → Loopback Plug (connects TX to RX pins; the switch port tests itself by sending and receiving on the same port)","wrongAnswers":["Scenario A → Toner Probe — a toner probe identifies which cable run connects two locations. A cable tester verifies the internal wiring of a cable (all 8 wires, correct pinout, no shorts). These test different things.","Scenario E → Punchdown Tool — a punchdown tool seats wires into keystone/patch panel blocks. A crimper attaches RJ-45 connectors to the end of a cable. These are different connectors and different tools.","Scenario D → Crimper — keystone jacks use 110-block punchdown termination. RJ-45 patch cable ends use a crimper. Using the wrong tool damages the connector."],"rationale":"Network tool identification is tested on the 220-1201 exam. Cable tester = verify assembled cable wiring. Toner probe = trace cable runs. Wi-Fi analyzer = wireless channel/interference analysis. Punchdown tool = terminate keystone/patch panel. Crimper = attach RJ-45 ends. Loopback plug = self-test a port. Each tool has a specific, non-interchangeable function."},{"id":75,"exam":"220-1201","domain":"2.0 Networking","objective":"2.8","objectiveText":"Given a scenario, use networking tools.","title":"Wi-Fi Analyzer Interpretation","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A Wi-Fi analyzer shows the following data for an office building:\n\nChannel 6: Your AP (Signal: -45 dBm), Neighbor AP \"CoffeeShop_WiFi\" (Signal: -72 dBm)\nChannel 6: Another neighbor AP \"Apt3B_Network\" (Signal: -68 dBm)\nChannel 1: Your AP's second radio (Signal: -47 dBm)\nChannel 11: No networks detected\n\nUsers on Channel 6 are reporting slow speeds and dropped connections during business hours.\n\nQuestion 1: Why are users on Channel 6 experiencing interference even though your AP has the strongest signal (-45 dBm)?\n[ ▼ ] Options: -45 dBm is too weak / Two other networks are co-channel on Channel 6, causing contention / Channel 6 only supports 2.4 GHz / The AP needs a firmware update\n\nQuestion 2: What is the correct remediation to eliminate the co-channel interference?\n[ ▼ ] Options: Increase your AP transmit power / Move your AP to Channel 11, which has no competing networks / Add a second AP on Channel 6 / Switch to WEP encryption\n\nQuestion 3: Channels 1, 6, and 11 are considered the best choices for 2.4 GHz networks. Why?\n[ ▼ ] Options: They are the fastest channels / They are the only non-overlapping channels in the 2.4 GHz band / They have the widest coverage / They are required by FCC regulations","correctAnswer":"Q1: Two other networks are co-channel on Channel 6, causing contention — co-channel interference occurs when multiple APs use the same channel. All devices must share airtime, causing collisions and retransmissions.\nQ2: Move your AP to Channel 11, which has no competing networks — Channel 11 is completely clear. Moving there eliminates co-channel interference entirely.\nQ3: They are the only non-overlapping channels in the 2.4 GHz band — the 2.4 GHz band has 11 channels in the US (13 in Europe) but only channels 1, 6, and 11 are spaced far enough apart to not overlap. Using overlapping channels causes adjacent-channel interference.","wrongAnswers":["Q1: -45 dBm is too weak — -45 dBm is actually an excellent signal (closer to 0 = stronger). The issue is not signal strength; it is channel contention from multiple APs on the same channel.","Q2: Increase transmit power — increasing your AP's power makes the co-channel interference worse by expanding the area where your AP and the neighbors compete. It does not resolve the contention.","Q3: They are the fastest channels — all 2.4 GHz channels have the same speed potential. Channels 1, 6, and 11 are preferred because they do not overlap, which prevents interference."],"rationale":"Wi-Fi channel analysis is tested on the 220-1201 exam. Co-channel interference occurs when multiple APs use the same channel. The fix is moving to an unused non-overlapping channel. In 2.4 GHz, channels 1, 6, and 11 are the three non-overlapping options. dBm values: closer to 0 = stronger signal (-45 is excellent, -80 is poor)."},{"id":76,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.3","objectiveText":"Given a scenario, troubleshoot video, projector, and display issues.","title":"Display Problem Diagnosis","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each display symptom to its most likely root cause.\n\nSymptoms:\nA. The monitor displays a flickering image that gets worse when the screen brightness is higher\nB. A laptop screen shows content normally, but when connected to an external monitor via HDMI, the external screen shows no signal\nC. A monitor displays a correctly sized image, but the colors are noticeably washed out and everything has a yellowish tint\nD. The monitor shows the Windows desktop but has a single bright pixel that is always the same color regardless of what is on screen\nE. A projector displays an image that is brighter on one side and noticeably dim on the other\nF. A monitor makes a buzzing sound and the image appears to shake or roll intermittently\n\nRoot causes: Stuck/dead pixel, Defective or dying inverter/backlight, Failing projector lamp nearing end of life, Incorrect color temperature or profile setting, Refresh rate mismatch or ground loop (electromagnetic interference), Incorrect display output setting or failed GPU output","correctAnswer":"A (Flickers worse at higher brightness) → Defective/dying inverter or backlight (the backlight struggles under load; common in aging CCFL-backlit monitors)\nB (External monitor no signal) → Incorrect display output setting or failed GPU output (function key combo may need to toggle outputs; GPU port may be faulty)\nC (Washed out yellow tint) → Incorrect color temperature/profile setting (Night Light / warm color mode may be enabled, or the color profile needs calibration)\nD (Single always-on bright pixel) → Stuck pixel (a pixel stuck in an always-on state; distinct from a dead pixel which is always black)\nE (Projector dim on one side) → Failing projector lamp nearing end of life (uneven illumination is a sign the lamp is degrading)\nF (Buzzing and rolling image) → Refresh rate mismatch or electromagnetic interference / ground loop (incorrect refresh rate or nearby electromagnetic source)","wrongAnswers":["Symptom D → Dead pixel — a dead pixel is permanently black (no light at all). A stuck pixel is permanently illuminated in a fixed color. These are different hardware defects with different visual symptoms.","Symptom B → Stuck pixel — no signal on an external monitor is an output routing or GPU issue. A stuck pixel would appear on the connected display, not prevent it from receiving a signal.","Symptom A → Stuck pixel — screen flickering is not related to pixel defects. Flickering that worsens with brightness points to the backlight or inverter struggling under load."],"rationale":"Display troubleshooting is tested on the 220-1201 exam. Key distinctions: stuck pixel (always-on color) vs dead pixel (always black). Backlight/inverter failure = brightness-dependent flickering. Color tint issues = settings-based fix. No external signal = GPU output or toggle key. Projector dim spots = lamp degradation."},{"id":77,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.3","objectiveText":"Given a scenario, troubleshoot video, projector, and display issues.","title":"Resolution and Refresh Rate Configuration","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A user calls complaining that after connecting a new 4K monitor, their display looks blurry and everything appears larger than expected. The monitor supports 3840x2160 at 60Hz. The current display settings show 1920x1080 at 60Hz.\n\nQuestion 1: What is the root cause of the blurry, oversized appearance?\n[ ▼ ] Options: The monitor is defective / The display is running at a lower resolution than the monitor's native resolution / The refresh rate is too low / The cable is faulty\n\nQuestion 2: To set the correct native resolution in Windows 11, where does the technician navigate?\n[ ▼ ] Options: Device Manager > Display Adapters / Settings > System > Display > Display Resolution / Control Panel > System > Hardware / Task Manager > Performance\n\nQuestion 3: After setting 4K resolution, the user's text appears very small. What Windows feature addresses this?\n[ ▼ ] Options: Reduce the resolution back to 1080p / Enable Display Scaling / Change the refresh rate / Enable Night Light mode","correctAnswer":"Q1: Running at lower resolution than native — 1920x1080 on a 4K monitor means each logical pixel is displayed across multiple physical pixels, causing blur and making everything appear larger than at native resolution.\nQ2: Settings > System > Display > Display Resolution — this is the correct Windows 11 path to change screen resolution.\nQ3: Enable Display Scaling (DPI scaling) — at 4K resolution on a typical monitor, UI elements are very small. Windows Display Scaling (125%, 150%, 200%) enlarges text and UI elements while keeping the sharp native resolution.","wrongAnswers":["Q1: Refresh rate too low — low refresh rate causes visual flicker, not blur or oversized elements. The blur described is caused by non-native resolution scaling.","Q2: Device Manager > Display Adapters — Device Manager manages hardware drivers. Display resolution settings are in Windows Settings (or right-click Desktop > Display Settings). These are different locations.","Q3: Reduce resolution to 1080p — reducing resolution brings back the original blurry appearance and defeats the purpose of having a 4K monitor. DPI scaling preserves native resolution while making UI legible."],"rationale":"Display resolution troubleshooting involves understanding native resolution (the monitor's actual pixel count), the blurry/scaled appearance of non-native resolutions, and DPI scaling for high-resolution displays. The exam tests both identifying the problem and knowing the correct Windows settings path."},{"id":78,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.6","objectiveText":"Given a scenario, configure Microsoft Windows settings.","title":"Windows Settings vs Control Panel Navigation","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each configuration task to the correct location in Windows 10/11.\n\nLocations: Settings > System > Display, Settings > Accounts > Sign-in Options, Control Panel > Programs and Features, Settings > Privacy & Security > Windows Security, Control Panel > Device Manager (or Settings > System > About > Device Manager), Settings > System > Sound, Settings > Network & Internet > VPN\n\nTasks:\nA. Uninstalling a legacy desktop application that does not appear in the Windows 11 Settings apps list\nB. Adding a corporate VPN connection with server address and authentication type\nC. Changing the default audio output device when multiple speakers or headsets are connected\nD. Configuring Windows Hello fingerprint or PIN for faster login\nE. Setting the primary monitor and adjusting orientation (landscape/portrait) in a dual-monitor setup\nF. Opening Device Manager to update a driver for a newly installed hardware component\nG. Viewing Windows Defender Antivirus status and running a quick scan","correctAnswer":"A → Control Panel > Programs and Features (legacy app removal; some apps don't show in Settings > Apps)\nB → Settings > Network & Internet > VPN\nC → Settings > System > Sound\nD → Settings > Accounts > Sign-in Options (Windows Hello PIN, fingerprint, face)\nE → Settings > System > Display (monitor arrangement, orientation)\nF → Control Panel > Device Manager (or Settings > System > About > Device Manager link)\nG → Settings > Privacy & Security > Windows Security (Defender dashboard)","wrongAnswers":["VPN → Settings > Privacy & Security — VPN is a network configuration, not a privacy/security setting in Windows navigation. It is under Network & Internet.","Legacy app uninstall → Settings > Apps — some legacy .exe installers do not register in the new Settings > Apps list. Control Panel > Programs and Features shows all installed programs and is the reliable fallback.","Windows Hello → Settings > System > Display — Windows Hello biometric settings are under Accounts > Sign-in Options. Display settings control visual output, not authentication."],"rationale":"Knowing the correct navigation path in Windows is tested on the 220-1202 exam. Microsoft has been migrating settings from Control Panel to Settings, but Control Panel still has unique functions like legacy program uninstall and advanced network adapter properties. The exam tests both Settings paths and legacy Control Panel locations."},{"id":79,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.6","objectiveText":"Given a scenario, configure Microsoft Windows settings.","title":"Internet Options / Browser Proxy Configuration","difficulty":"Medium","uiType":"Text Input","scenario":"A company requires all internet traffic from Windows workstations to pass through a proxy server for filtering and monitoring. The proxy server's address is proxy.company.com and it uses port 8080.\n\nA technician needs to configure this in Windows 10 using the command-line PowerShell approach rather than the GUI.\n\nType the PowerShell command that sets the system proxy server to proxy.company.com on port 8080.","correctAnswer":"netsh winhttp set proxy proxy.company.com:8080\n\nAlternative PowerShell approach:\nSet-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings' -Name ProxyServer -Value \"proxy.company.com:8080\"\nSet-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings' -Name ProxyEnable -Value 1\n\nThe netsh approach sets the WinHTTP proxy (used by Windows Update and system-level connections). The registry approach sets the Internet Explorer/system proxy used by most applications.","wrongAnswers":["set proxy proxy.company.com:8080 — 'set proxy' is not a valid standalone Windows command. The correct command includes the 'netsh winhttp' prefix.","ipconfig /proxy proxy.company.com:8080 — ipconfig only manages IP address configuration. It has no proxy-setting capability.","netsh interface set proxy — 'netsh interface' manages network interface settings (IP, DNS), not proxy configuration. The correct context is 'netsh winhttp'."],"rationale":"Proxy configuration is tested on the 220-1202 exam. The GUI path is Settings > Network & Internet > Proxy. The CLI path uses netsh winhttp set proxy for system-level settings, or registry edits for per-user settings. Understanding where proxy settings live is important for troubleshooting applications that fail to reach the internet."},{"id":80,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.4","objectiveText":"Given a scenario, troubleshoot problems with storage drives and RAID arrays.","title":"RAID Level Selection and Failure Analysis","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A small business server currently has 4 identical 4TB hard drives and needs a RAID configuration.\n\nQuestion 1: The company's top priority is performance with no fault tolerance needed. Which RAID level provides the best read/write performance by striping data across all 4 drives with NO redundancy?\n[ ▼ ] Options: RAID 0 / RAID 1 / RAID 5 / RAID 10\n\nQuestion 2: The IT manager changes priorities to: must survive any single disk failure, use all 4 drives, and maximize usable storage. Which RAID level is most appropriate?\n[ ▼ ] Options: RAID 0 / RAID 1 / RAID 5 / RAID 10\n\nQuestion 3: With 4 drives of 4TB each in RAID 5, how much usable storage is available?\n[ ▼ ] Options: 4TB (25% usable) / 8TB (50% usable) / 12TB (75% usable) / 16TB (100% usable)","correctAnswer":"Q1: RAID 0 (striping only, maximum performance, zero fault tolerance — one drive fails, all data is lost)\nQ2: RAID 5 (striping with distributed parity — survives one drive failure, maximizes usable space from all 4 drives)\nQ3: 12TB usable — RAID 5 uses the equivalent of one drive for distributed parity. With 4 x 4TB drives, parity uses 4TB worth of space, leaving 3 x 4TB = 12TB usable. Formula: (N-1) x drive size.","wrongAnswers":["Q1: RAID 5 — RAID 5 provides fault tolerance via parity, which adds overhead to write operations. RAID 0 is the fastest because it simply stripes data without any parity calculation.","Q2: RAID 1 — RAID 1 mirrors two drives (50% efficiency). With 4 drives, RAID 1 in pairs wastes more capacity than RAID 5. RAID 5 uses (N-1)/N of total capacity.","Q3: 8TB — 8TB would be 50% efficiency, which is RAID 1 or RAID 10. RAID 5 uses one drive equivalent for parity, leaving N-1 drives of usable space: 3 x 4TB = 12TB."],"rationale":"RAID levels are frequently tested on the 220-1201 exam. RAID 0 = performance, no redundancy. RAID 1 = mirroring, 50% efficiency. RAID 5 = striping + parity, survives 1 drive failure, (N-1) usable capacity. RAID 10 = mirroring + striping, survives multiple failures, 50% efficiency. RAID 5 with 4 drives: 3 x drive size = usable space."},{"id":81,"exam":"220-1202","domain":"2.0 Security","objective":"2.1","objectiveText":"Summarize various security measures and their purposes.","title":"Multi-Factor Authentication Types","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each authentication method under the correct authentication factor type.\n\nFactor types: Something You Know, Something You Have, Something You Are, Somewhere You Are (Location-based)\n\nAuthentication methods:\nA. Fingerprint scan\nB. Password\nC. Hardware security token (RSA SecurID) generating a 6-digit code\nD. Retinal scan\nE. PIN number\nF. Smart card (CAC/PIV card)\nG. GPS-verified location check before granting access\nH. Security question answer (\"What was your mother's maiden name?\")\nI. Facial recognition via Windows Hello\nJ. One-time password (OTP) sent to a registered mobile phone","correctAnswer":"Something You Know: B (password), E (PIN), H (security question)\nSomething You Have: C (hardware token), F (smart card), J (OTP to phone — the phone is what you have)\nSomething You Are (Biometrics): A (fingerprint), D (retinal scan), I (facial recognition)\nSomewhere You Are: G (GPS/location-based access control)","wrongAnswers":["OTP → Something You Know — an OTP sent to your phone is 'something you have' (the phone). You receive the code rather than memorize it. If you knew the code in advance, it would not be a one-time password.","PIN → Something You Have — a PIN is something you memorize, making it 'something you know,' just like a password. It is not a physical object.","Smart card → Something You Are — a smart card is a physical object you carry. It is 'something you have,' not a biometric. Biometrics require a physical characteristic of your body."],"rationale":"Multi-factor authentication (MFA) combines factors from different categories for stronger security. Something you know = memorized secret. Something you have = physical object. Something you are = biometric. True MFA requires factors from at least two different categories. The exam tests correct categorization of each method."},{"id":82,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.3","objectiveText":"Given a scenario, troubleshoot common mobile OS and application issues.","title":"Mobile OS Troubleshooting Flowchart","difficulty":"Hard","uiType":"Radio Button","scenario":"A user's Android phone is experiencing all of the following issues simultaneously:\n- Apps crash randomly\n- Battery drains in 3 hours (normally lasts 12 hours)\n- Phone runs hot even when idle\n- A new app was installed 2 days ago just before the issues started\n\nThe technician suspects the new app is a poorly coded or malicious application causing excessive background processing.\n\nWhat is the BEST next step to confirm the diagnosis before taking any drastic action?\n\nO Factory reset the phone immediately\nO Remove the SIM card to prevent cellular activity\nO Check the Battery Usage settings and/or use a background process monitor to identify which app is consuming the most CPU and battery\nO Back up the phone and send it for hardware repair\nO Turn off Wi-Fi to see if the problem stops","correctAnswer":"Check Battery Usage settings and/or a background process monitor.\n\nAndroid's Settings > Battery > Battery Usage (or Settings > Device Care > Battery) shows CPU and battery consumption by app. If the new app appears at the top of battery consumption despite not being actively used, this confirms it is the root cause. The technician can then uninstall the specific app, which is a targeted fix that doesn't affect the rest of the phone.","wrongAnswers":["Factory reset immediately — a factory reset erases all data. Before taking that step, the technician should confirm the root cause by checking battery/process usage. If the new app is confirmed as the issue, simply uninstalling it solves the problem without a factory reset.","Remove the SIM card — SIM removal disables cellular service but does not address a rogue app consuming CPU. An app running background processes will continue to drain the battery regardless of the SIM.","Turn off Wi-Fi — a poorly coded app may use CPU regardless of network connectivity. This test would rule out Wi-Fi-triggered activity but does not identify the specific app."],"rationale":"Mobile troubleshooting requires using built-in diagnostic tools before resorting to destructive fixes. Android Battery Usage is the correct first diagnostic tool when excessive battery drain starts after app installation. It identifies the specific culprit without losing user data. Factory reset is always the last resort."},{"id":83,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.2","objectiveText":"Given a scenario, install and configure a basic wired/wireless SOHO network.","title":"Power Supply Wattage Calculation","difficulty":"Hard","uiType":"Text Input","scenario":"A technician is selecting a power supply for a new PC build with the following components:\n\nCPU: 125W TDP\nGPU: 250W TDP\nMotherboard: 50W\nRAM (4 sticks): 5W each = 20W total\nStorage (2 NVMe SSDs): 10W each = 20W total\nCase fans (3): 5W each = 15W total\nMisc (USB devices, RGB): 20W\n\nCompTIA best practice recommends selecting a PSU with at least 20% headroom above the calculated total.\n\nType the minimum recommended PSU wattage (rounded up to the nearest standard tier: 500W, 550W, 600W, 650W, 700W, 750W, 800W).","correctAnswer":"Total component draw: 125 + 250 + 50 + 20 + 20 + 15 + 20 = 500W\nWith 20% headroom: 500W x 1.20 = 600W minimum\n\nRecommended PSU: 600W\n\nA 600W PSU is the minimum recommended. Many builders would choose 650W or 750W for additional future-proofing.","wrongAnswers":["500W — this matches the raw component total but provides no headroom. A PSU running at 100% load runs hot, degrades faster, and has no margin for power spikes during GPU boost states.","800W — while 800W is a safe choice, it is not the minimum recommended. The question asks for the minimum based on the 20% headroom rule, which yields exactly 600W.","750W — while a good practical choice, it exceeds the minimum calculated requirement. The exam is testing calculation of the minimum, not the maximum."],"rationale":"PSU selection requires calculating total component TDP and adding a headroom buffer. CompTIA recommends 20% headroom to account for power spikes, aging efficiency, and future upgrades. The formula: (sum of component TDP) x 1.20 = minimum PSU wattage. Real-world builds often choose the next tier up for longevity."},{"id":84,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.3","objectiveText":"Given a scenario, use features and tools of the macOS/desktop operating system.","title":"Windows Upgrade Path Decision","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A company has 50 workstations running Windows 10 Pro. Their Microsoft Software Assurance agreement entitles them to Windows 11. The IT manager asks the technician to plan the upgrade approach.\n\nQuestion 1: Windows 11 has a hardware requirement that many older business PCs may not meet. What is the most commonly cited hardware requirement that blocks Windows 11 installation on older systems?\n[ ▼ ] Options: Minimum 16 GB RAM / TPM 2.0 chip / 1TB SSD required / USB 3.0 ports required\n\nQuestion 2: For a single workstation that meets all requirements, what is the upgrade path that preserves the user's files, apps, and settings?\n[ ▼ ] Options: Clean install (format and reinstall) / In-place upgrade / Backup only user files and clean install / Roll back to Windows 8 first\n\nQuestion 3: The company wants to deploy Windows 11 to all 50 workstations simultaneously using a pre-configured image. What deployment method is most appropriate at this scale?\n[ ▼ ] Options: Manually upgrading each PC one at a time / Image deployment via MDT/WDS or an endpoint management solution like Intune / Sending each user a USB drive with the installer / Using Windows Update only","correctAnswer":"Q1: TPM 2.0 (Trusted Platform Module version 2.0) — Microsoft requires TPM 2.0 for Windows 11. Many business PCs from 2017 and earlier either have no TPM or only TPM 1.2. This is the most common hardware blocker.\nQ2: In-place upgrade — an in-place upgrade installs Windows 11 over Windows 10 while preserving all user files, installed applications, and settings. It is the standard upgrade method for individual machines.\nQ3: Image deployment via MDT/WDS or endpoint management (Intune/SCCM) — for 50 machines, manual upgrades are impractical. Image deployment or centralized management tools push a configured image to all machines, ensuring consistency and efficiency.","wrongAnswers":["Q1: 16 GB RAM — Windows 11 requires only 4 GB of RAM minimum. While 16 GB is recommended for productivity, it is not a blocking hardware requirement.","Q2: Clean install — a clean install erases everything. While it results in a clean system, the user loses their installed applications and must reconfigure settings. An in-place upgrade preserves everything.","Q3: Windows Update only — Windows Update delivers upgrades for individual consumers. At enterprise scale, IT teams use deployment tools for version control, testing, and rollback capabilities."],"rationale":"Windows 11 hardware requirements include TPM 2.0, UEFI with Secure Boot, 64-bit CPU (compatible), 4 GB RAM, and 64 GB storage. TPM 2.0 is the most commonly blocking requirement in business environments. In-place upgrade preserves data. Image deployment is the enterprise-scale solution."},{"id":85,"exam":"220-1201","domain":"2.0 Networking","objective":"2.4 / 2.5","objectiveText":"Compare and contrast networking hardware and deploy/configure networks.","title":"OSI Layer Device Matching","difficulty":"Hard","uiType":"Drag and Drop (Match)","scenario":"Match each network device or protocol to the primary OSI layer at which it operates.\n\nDevices/Protocols: Hub, Switch (managed Layer 2), Router, Firewall (stateful), IP Address, MAC Address, HTTP/HTTPS, TLS/SSL Encryption\n\nOSI Layers: Layer 1 (Physical), Layer 2 (Data Link), Layer 3 (Network), Layer 4 (Transport), Layer 7 (Application)","correctAnswer":"Hub → Layer 1 (Physical) — a hub repeats electrical signals; no intelligence, no MAC table\nSwitch (L2) → Layer 2 (Data Link) — switches forward frames based on MAC addresses\nRouter → Layer 3 (Network) — routers forward packets based on IP addresses\nFirewall (stateful) → Layer 3/4 (Network/Transport) — stateful firewalls track connection state at Layer 4 while operating on IP (L3) and port numbers (L4)\nIP Address → Layer 3 (Network) — IP addressing is the Layer 3 logical addressing scheme\nMAC Address → Layer 2 (Data Link) — MAC addresses are Layer 2 hardware addresses\nHTTP/HTTPS → Layer 7 (Application) — web protocols operate at the application layer\nTLS/SSL → Layer 4/5 (Transport/Session) — TLS provides encryption between Transport and Application layers; commonly associated with Layer 4","wrongAnswers":["Switch → Layer 1 — hubs are Layer 1 (dumb repeaters). Switches operate at Layer 2 by learning MAC addresses and making forwarding decisions based on them.","Router → Layer 2 — routers make decisions based on IP addresses (Layer 3 logical addressing), not MAC addresses (Layer 2 physical addressing). A router moves packets between networks; a switch moves frames within a network.","HTTP → Layer 4 — HTTP is an application protocol (Layer 7). Layer 4 (Transport) handles TCP/UDP segment delivery. These are distinct layers with different functions."],"rationale":"OSI layer knowledge is foundational for the 220-1201 exam and troubleshooting. Layer 1 = hubs, cables, signals. Layer 2 = switches, MAC addresses, frames. Layer 3 = routers, IP addresses, packets. Layer 4 = TCP/UDP, ports, segments. Layer 7 = application protocols (HTTP, FTP, DNS). Understanding layers helps isolate where a network problem exists."},{"id":86,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.7","objectiveText":"Given a scenario, use proper communication techniques and professionalism.","title":"Professional Communication Scenario","difficulty":"Easy","uiType":"Radio Button","scenario":"A frustrated user calls the help desk and says: \"This stupid computer is broken AGAIN! Your IT team clearly doesn't know what they're doing. I've called three times this month about the same problem and nobody fixes it!\"\n\nWhat is the best response from the help desk technician?\n\nO \"I understand your frustration. This does seem to have been an ongoing problem. Can you walk me through what's happening right now so I can get this properly resolved for you?\"\nO \"I'm sorry, but this isn't really our fault. The problem is with your department's hardware budget.\"\nO \"I completely understand — my colleagues should have fixed this already. You're absolutely right to be upset with them.\"\nO \"If you calm down, I can try to help you.\"\nO \"Can I put you on hold while I read the previous ticket notes?\"","correctAnswer":"\"I understand your frustration. This does seem to have been an ongoing problem. Can you walk me through what's happening right now so I can get this properly resolved for you?\"\n\nThis response: (1) acknowledges the user's frustration without dismissing it, (2) validates that the problem is real and recurring, (3) moves forward constructively by gathering information, and (4) demonstrates ownership of getting it resolved. It maintains professionalism without blaming colleagues or being dismissive.","wrongAnswers":["Blaming the hardware budget — deflecting blame onto other departments is unprofessional and damages the user's trust in IT. It does not solve the problem.","Agreeing and criticizing colleagues — publicly criticizing other team members to appease an angry user is unprofessional. It undermines team cohesion and does not resolve the issue.","Telling the user to calm down — instructing an upset person to calm down typically escalates frustration. It comes across as dismissive and condescending."],"rationale":"Professional communication is tested on the 220-1202 exam. Core principles: avoid jargon, maintain positive attitude, avoid interrupting, actively listen, avoid blaming others, set realistic expectations, and always keep focus on solving the user's problem. Acknowledging frustration while directing toward resolution is the correct approach."},{"id":87,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.1","objectiveText":"Given a scenario, troubleshoot common Windows OS problems.","title":"Windows Application Crash Diagnosis","difficulty":"Hard","uiType":"Command Prompt / Terminal","scenario":"A user reports that Microsoft Word crashes every time they try to open a specific .docx file. Other Office applications work fine. Other Word documents open without issue. The issue is isolated to this single file.\n\nThe technician suspects the file may be corrupted. The technician opens an elevated Command Prompt.\n\nType the command to open the specific Word document in Protected View / Safe Mode to isolate whether a corrupt add-in or the file itself is causing the crash.","correctAnswer":"winword /safe\n\nThis starts Microsoft Word in Safe Mode, disabling all add-ins, customizations, and auto-loaded templates. If Word opens successfully in Safe Mode but crashes normally, the cause is a corrupt add-in or template. If it still crashes in Safe Mode with that specific file, the file itself is corrupt.\n\nTo open a specific file in safe mode: winword /safe \"C:\\path\\to\\document.docx\"","wrongAnswers":["word /safe — the executable name is 'winword.exe', not 'word.exe'. The /safe switch is correct but the command name is wrong.","winword /repair — there is no /repair switch for Word. Office repair is done through Settings > Apps > Microsoft Office > Modify > Quick Repair or Online Repair.","sfc /scannow — this scans Windows system files, not Office application files. It would not fix a corrupt Office add-in or specific document file."],"rationale":"Office application Safe Mode (winword /safe, excel /safe, outlook /safe) is a critical troubleshooting tool. Safe Mode disables all add-ins and customizations, helping isolate whether a crash is caused by an add-in, template, or the file itself. If Safe Mode works but normal mode crashes, disable add-ins one by one to find the culprit."},{"id":88,"exam":"220-1201","domain":"1.0 Mobile Devices","objective":"1.1","objectiveText":"Given a scenario, monitor mobile device hardware and use appropriate replacement techniques.","title":"Laptop Disassembly and Component Access","difficulty":"Hard","uiType":"Drag and Drop (Categorize)","scenario":"A technician is servicing a range of laptops. For each component, categorize it as Typically User-Serviceable (can usually be replaced without specialized tools or voiding warranty) or Typically Non-User-Serviceable (soldered or requires significant disassembly; specialized tools or voids warranty).\n\nNote: \"Typical\" refers to mainstream business/consumer laptops from the last 5 years.\n\nComponents:\nA. RAM in a thin-and-light ultrabook (LPDDR5 soldered to the motherboard)\nB. M.2 NVMe SSD in a standard business laptop with accessible bottom panel\nC. Laptop screen/LCD display assembly\nD. Battery in a modern thin laptop (glued, no access panel)\nE. RAM in a traditional business laptop (standard SO-DIMM slots under access panel)\nF. CPU in any modern laptop (soldered BGA package)\nG. Laptop keyboard (requires disassembly on most modern thin laptops)\nH. External USB port module or board (in a laptop with a modular design)","correctAnswer":"Typically User-Serviceable: B, E, H\n  B - M.2 SSD under an accessible bottom panel (common on business laptops)\n  E - SO-DIMM RAM with a dedicated access panel (traditional design)\n  H - Modular USB boards (on some designs)\n\nTypically Non-User-Serviceable: A, C, D, F, G\n  A - Soldered LPDDR5 RAM cannot be replaced without reballing the BGA package (requires professional equipment)\n  C - Screen replacement requires removing bezel, disconnecting cables; complex but doable; often voids warranty\n  D - Glued battery in thin laptops requires significant disassembly and heat tools to avoid damaging the battery\n  F - BGA-soldered CPUs cannot be replaced in any practical consumer/business laptop\n  G - Keyboard replacement on most modern thin laptops requires complete top-case disassembly","wrongAnswers":["Soldered RAM (A) → User-Serviceable — soldered memory is permanently attached to the motherboard PCB. It cannot be removed or upgraded without desoldering the chips, which requires professional SMD rework equipment.","CPU (F) → User-Serviceable — virtually all modern laptop CPUs are BGA-soldered. There are no socketed laptop CPUs in mainstream consumer/business models. CPU upgrade is not a realistic repair option.","M.2 SSD (B) → Non-User-Serviceable — most business laptops have an accessible M.2 slot reachable by removing a few Phillips screws from the bottom panel. This is specifically designed to be user-upgradeable."],"rationale":"Laptop serviceability is tested on the 220-1201 exam. Modern thin laptops increasingly solder components (RAM, CPU, sometimes SSD) to reduce thickness. User-serviceable components typically have dedicated access panels. The technician must assess the specific model before telling a customer whether an upgrade is possible."},{"id":89,"exam":"220-1202","domain":"2.0 Security","objective":"2.9","objectiveText":"Given a scenario, configure appropriate security settings on SOHO wireless and wired networks.","title":"SOHO Router Security Hardening","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"A new SOHO router has just been installed with factory defaults. Categorize each configuration action as a Required Security Step (must do before deployment) or an Optional Enhancement (improves security but not essential).\n\nActions:\nA. Change the default admin username and password\nB. Update the router firmware to the latest version\nC. Disable WPS (Wi-Fi Protected Setup)\nD. Change the default SSID from \"Linksys\" or \"NETGEAR\" to a custom name (not revealing the brand)\nE. Enable UPnP (Universal Plug and Play) for easier device compatibility\nF. Disable remote management access from the internet\nG. Configure the guest Wi-Fi network to be isolated from the main LAN\nH. Set up port forwarding for all common ports to enable easier access","correctAnswer":"Required Security Steps: A, B, C, F\n  A - Default credentials are publicly known; changing them is the first and most critical step\n  B - Firmware updates patch known vulnerabilities, including critical security flaws\n  C - WPS has documented vulnerabilities (Pixie Dust, PIN brute force) and should be disabled\n  F - Remote management from the internet exposes the admin interface to global attack surface\n\nOptional Enhancements: D, G\n  D - Changing the default SSID prevents brand identification but does not directly improve security\n  G - Guest network isolation is highly recommended for businesses but optional for a minimal home setup\n\nShould NOT Do (security risk): E, H\n  E - UPnP automatically opens ports which attackers can exploit; should be disabled\n  H - Blanket port forwarding exposes all services to the internet; only specific needed ports should be forwarded","wrongAnswers":["UPnP (E) as Optional Enhancement — UPnP is a security risk, not just an optional feature. It allows applications and devices to automatically open ports, which malware also exploits. Disabling UPnP is the security-conscious choice.","Default credentials change (A) as Optional — changing the default admin password is mandatory. Default credentials are published in manufacturer documentation and exploited in the first minutes after deployment.","WPS (C) as Optional — WPS has known, published exploits that allow network access bypassing the Wi-Fi password entirely. Disabling it is a required security step, not optional."],"rationale":"SOHO router security hardening is tested on the 220-1202 exam. Non-negotiable first steps: change default credentials, update firmware, disable WPS, disable remote management. UPnP should be disabled (security risk). SSID changes have minimal security value. Guest network isolation is best practice, especially for businesses."},{"id":90,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.2","objectiveText":"Given a scenario, troubleshoot common personal computer security issues.","title":"Malware Symptom Identification","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each computer symptom to the type of malware most likely causing it.\n\nMalware types: Ransomware, Rootkit, Spyware/Keylogger, Cryptominer, Adware, Botnet agent, Trojan\n\nSymptoms:\nA. A user notices their antivirus has been disabled and they cannot re-enable it; their system shows unfamiliar processes that restart immediately if killed\nB. All documents have been renamed with a .encrypted extension and a text file appeared demanding Bitcoin payment\nC. The workstation's CPU runs at 95-100% utilization constantly, even when no applications are open, and the system runs very hot\nD. The user's online banking password was changed by an unknown party; the bank logs show a login from an overseas IP the same morning\nE. Random pop-up advertisements appear even when no browser is open; some pop-ups appear in the Windows system tray area\nF. The user downloaded a free game; shortly after, their PC started sending large volumes of spam email without the user's knowledge\nG. Security software and antivirus tools show no infection, but a sophisticated attacker has had persistent access to the system for months","correctAnswer":"A → Rootkit (modifies OS-level processes to hide itself; can disable security tools and survive reboots)\nB → Ransomware (encrypts files and demands payment for decryption key)\nC → Cryptominer (uses victim's CPU/GPU to mine cryptocurrency in the background)\nD → Spyware/Keylogger (captures keystrokes including passwords; credentials exfiltrated to attacker)\nE → Adware (generates advertising revenue by displaying ads, including outside the browser)\nF → Trojan + Botnet agent (Trojan delivered via fake game; then enrolled the PC in a botnet for spam sending)\nG → Rootkit (sophisticated rootkits hide from security software using kernel-level techniques)","wrongAnswers":["Symptom C → Ransomware — ransomware encrypts files and displays ransom notes. It does not cause sustained high CPU usage. Cryptomining is specifically characterized by persistent high CPU/GPU utilization.","Symptom A → Adware — adware focuses on displaying advertisements and is generally unsophisticated. Disabling antivirus, hiding processes, and surviving kills are characteristics of rootkits.","Symptom B → Trojan — while ransomware is often delivered via a Trojan, the symptom described (encrypted files, ransom note) is the definitive ransomware symptom. A Trojan is the delivery mechanism, not the payload."],"rationale":"Malware type identification is tested on the 220-1202 exam. Each type has distinguishing symptoms: ransomware = encrypted files + ransom demand, cryptominer = sustained high CPU with no apps open, rootkit = persistent + hides from security tools, keylogger = credential theft, adware = ads outside the browser, botnet agent = participating in attack campaigns."}];</script>

<script>
const SCORES_KEY = 'pbq_scores_v2';
let scores = {};
try {
  const saved = localStorage.getItem(SCORES_KEY);
  if (saved) scores = JSON.parse(saved);
} catch(e) {}

function saveScores() {
  try { localStorage.setItem(SCORES_KEY, JSON.stringify(scores)); } catch(e) {}
}

let filtered = [];
let currentIdx = 0;
let revealState = {};

function getUiBadgeClass(t) {
  if (t.includes('Drag')) return 'ui-drag';
  if (t.includes('Drop-Down')) return 'ui-drop';
  if (t.includes('Text')) return 'ui-text';
  if (t.includes('Radio')) return 'ui-radio';
  if (t.includes('Command')) return 'ui-cli';
  return '';
}

function getUiShort(t) {
  if (t.includes('Drag')) return 'Drag & Drop';
  if (t.includes('Drop-Down')) return 'Drop-Down';
  if (t.includes('Text')) return 'Text Input';
  if (t.includes('Radio')) return 'Radio';
  if (t.includes('Command') || t.includes('Terminal')) return 'CLI';
  return t.split('(')[0].trim();
}

function getDiffBadge(d) {
  if (d === 'Easy') return 'badge-diff-easy';
  if (d === 'Medium') return 'badge-diff-medium';
  return 'badge-diff-hard';
}

function getDomainShort(d) {
  return d.replace('Hardware and Network Troubleshooting','HW & Net Troubleshoot')
          .replace('Virtualization and Cloud Computing','Virt & Cloud')
          .replace('Operating Systems','OS')
          .replace('Software Troubleshooting','SW Troubleshoot')
          .replace('Operational Procedures','Ops Procedures')
          .replace('0 Mobile Devices','Mobile')
          .replace('0 Networking','Networking')
          .replace('0 Hardware','Hardware')
          .replace('0 Security','Security')
          .split(' ').slice(0,3).join(' ');
}

function buildFiltered() {
  const exam = document.getElementById('f-exam').value;
  const domain = document.getElementById('f-domain').value;
  const diff = document.getElementById('f-diff').value;
  const type = document.getElementById('f-type').value;
  const status = document.getElementById('f-status').value;
  const search = document.getElementById('f-search').value.toLowerCase();

  filtered = ALL_SCENARIOS.filter(s => {
    if (exam && s.exam !== exam) return false;
    if (domain && !s.domain.includes(domain)) return false;
    if (diff && s.difficulty !== diff) return false;
    if (type && !s.uiType.includes(type)) return false;
    if (status === 'unanswered' && scores[s.id]) return false;
    if (status === 'incorrect' && scores[s.id] !== 'incorrect') return false;
    if (status === 'correct' && scores[s.id] !== 'correct') return false;
    if (search) {
      const hay = (s.title + s.scenario + s.domain + s.exam).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function buildSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  filtered.forEach((s, i) => {
    const li = document.createElement('li');
    li.className = 'sidebar-item' + (i === currentIdx ? ' active' : '') + (scores[s.id] ? ' done' : '');
    const sc = scores[s.id];
    const dot = sc === 'correct' ? '✓' : sc === 'incorrect' ? '✗' : String(s.id);
    li.innerHTML = `<span style="font-size:11px;min-width:24px">#${String(s.id).padStart(2,'0')}</span><span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</span><span class="sidebar-badge">${sc === 'correct' ? '✓' : sc === 'incorrect' ? '✗' : ''}</span>`;
    if (sc === 'correct') li.style.color = '#2e7d32';
    if (sc === 'incorrect') li.style.color = '#c62828';
    li.onclick = () => { currentIdx = i; renderCard(); buildSidebar(); };
    list.appendChild(li);
  });
}

function updateNavStats() {
  const correct = Object.values(scores).filter(v => v === 'correct').length;
  const incorrect = Object.values(scores).filter(v => v === 'incorrect').length;
  const total = Object.keys(scores).length;
  document.getElementById('nav-correct').textContent = correct;
  document.getElementById('nav-incorrect').textContent = incorrect;
  document.getElementById('nav-total').textContent = ALL_SCENARIOS.length;
  const pct = Math.round(total / ALL_SCENARIOS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = total + ' / ' + ALL_SCENARIOS.length + ' answered (' + pct + '%)';
}

function renderCard() {
  if (filtered.length === 0) {
    document.getElementById('view-card').style.display = 'none';
    document.getElementById('view-welcome').innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h2>No scenarios match your filters</h2><p>Try adjusting the filters above.</p></div>`;
    document.getElementById('view-welcome').style.display = '';
    return;
  }

  document.getElementById('view-welcome').style.display = 'none';
  document.getElementById('view-card').style.display = '';

  const s = filtered[currentIdx];
  const rv = revealState[s.id] || {};
  const scoreVal = scores[s.id];

  const html = `
<div class="scenario-card">
  <div class="card-header">
    <div class="card-num">${String(s.id).padStart(2,'0')}</div>
    <div class="card-title-area">
      <div class="card-title">${s.title}</div>
      <div class="card-meta">${s.exam} &bull; Obj. ${s.objective} &bull; ${s.domain}</div>
    </div>
    <div class="card-badges">
      <span class="badge badge-exam">${s.exam}</span>
      <span class="badge ${getDiffBadge(s.difficulty)}">${s.difficulty}</span>
      <span class="badge badge-ui ${getUiBadgeClass(s.uiType)}">${getUiShort(s.uiType)}</span>
    </div>
  </div>

  <div class="card-section">
    <div class="section-label">Scenario</div>
    <div class="scenario-text">${escHtml(s.scenario)}</div>
  </div>

  <div class="reveal-buttons">
    <button class="btn btn-reveal-answer" onclick="reveal('answer','${s.id}')">
      ${rv.answer ? '▼ Answer' : '▶ Reveal Answer'}
    </button>
    <button class="btn btn-reveal-wrong" onclick="reveal('wrong','${s.id}')">
      ${rv.wrong ? '▼ Wrong Answers' : '▶ Wrong Answers'}
    </button>
    <button class="btn btn-reveal-rationale" onclick="reveal('rationale','${s.id}')">
      ${rv.rationale ? '▼ Rationale' : '▶ Rationale'}
    </button>
  </div>

  <div class="card-section" id="sec-answer-${s.id}" style="${rv.answer ? '' : 'display:none'}">
    <div class="section-label" style="color:var(--green)">Correct Answer</div>
    <div class="answer-box shown">${escHtml(s.correctAnswer)}</div>
  </div>

  <div class="card-section" id="sec-wrong-${s.id}" style="${rv.wrong ? '' : 'display:none'}">
    <div class="section-label" style="color:var(--orange)">Common Wrong Answers</div>
    <div class="wrong-box shown">${s.wrongAnswers.map((w,i) => escHtml((i+1)+'. '+w)).join('\n\n')}</div>
  </div>

  <div class="card-section" id="sec-rationale-${s.id}" style="${rv.rationale ? '' : 'display:none'}">
    <div class="section-label" style="color:#795548">Rationale</div>
    <div class="rationale-box shown">${escHtml(s.rationale)}</div>
  </div>

  <div class="score-actions">
    <span class="label">${scoreVal ? 'Marked as:' : 'Mark this scenario:'}</span>
    ${scoreVal
      ? `<span class="answered-badge ${scoreVal === 'correct' ? 'answered-correct' : scoreVal === 'incorrect' ? 'answered-incorrect' : 'answered-skipped'}">${scoreVal === 'correct' ? '✓ Correct' : scoreVal === 'incorrect' ? '✗ Incorrect' : '— Skipped'}</span>
         <button class="btn btn-score-skip" style="padding:5px 10px;font-size:12px" onclick="unmark(${s.id})">Unmark</button>`
      : `<button class="btn btn-score-correct" onclick="markScore(${s.id},'correct')">✓ Got it</button>
         <button class="btn btn-score-incorrect" onclick="markScore(${s.id},'incorrect')">✗ Missed it</button>
         <button class="btn btn-score-skip" onclick="markScore(${s.id},'skip')">— Skip</button>`
    }
  </div>

  <div class="card-nav">
    <button class="btn-prev btn" onclick="prevCard()">← Prev</button>
    <span class="card-nav-info">${currentIdx + 1} of ${filtered.length} ${filtered.length < ALL_SCENARIOS.length ? '(filtered)' : ''}</span>
    <button class="btn-next btn ${currentIdx < filtered.length - 1 ? 'btn-next-primary' : ''}" onclick="nextCard()">
      ${currentIdx < filtered.length - 1 ? 'Next →' : 'Done ✓'}
    </button>
  </div>
</div>

<div class="stats-grid" style="margin-top:20px">
  ${statsCards()}
</div>
  `;

  document.getElementById('view-card').innerHTML = html;

  // Scroll sidebar item into view
  const activeItem = document.querySelector('.sidebar-item.active');
  if (activeItem) activeItem.scrollIntoView({block:'nearest'});
}

function statsCards() {
  const correct = Object.values(scores).filter(v => v === 'correct').length;
  const incorrect = Object.values(scores).filter(v => v === 'incorrect').length;
  const total = Object.keys(scores).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  return `
    <div class="stat-card"><div class="num">${ALL_SCENARIOS.length}</div><div class="lbl">Total scenarios</div></div>
    <div class="stat-card correct"><div class="num">${correct}</div><div class="lbl">Correct</div></div>
    <div class="stat-card incorrect"><div class="num">${incorrect}</div><div class="lbl">Incorrect</div></div>
    <div class="stat-card"><div class="num">${pct}%</div><div class="lbl">Score (answered)</div></div>
    <div class="stat-card"><div class="num">${ALL_SCENARIOS.length - total}</div><div class="lbl">Remaining</div></div>
  `;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function reveal(section, sid) {
  if (!revealState[sid]) revealState[sid] = {};
  revealState[sid][section] = !revealState[sid][section];
  renderCard();
}

function markScore(id, val) {
  scores[id] = val;
  saveScores();
  updateNavStats();
  buildSidebar();
  renderCard();
  if (val !== 'skip' && currentIdx < filtered.length - 1) {
    setTimeout(() => { currentIdx++; renderCard(); buildSidebar(); }, 400);
  }
}

function unmark(id) {
  delete scores[id];
  saveScores();
  updateNavStats();
  buildSidebar();
  renderCard();
}

function nextCard() {
  if (currentIdx < filtered.length - 1) {
    currentIdx++;
    renderCard();
    buildSidebar();
    document.getElementById('view-card').scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function prevCard() {
  if (currentIdx > 0) {
    currentIdx--;
    renderCard();
    buildSidebar();
  }
}

function buildDomainFilter() {
  const domains = [...new Set(ALL_SCENARIOS.map(s => s.domain))].sort();
  const sel = document.getElementById('f-domain');
  domains.forEach(d => {
    const o = document.createElement('option');
    o.value = d.replace(/^\d+\.\d+\s+/, '').split(' ')[0];
    o.textContent = d;
    sel.appendChild(o);
  });
}

function resetFilters() {
  ['f-exam','f-domain','f-diff','f-type','f-status'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-search').value = '';
  applyFilters();
}

function applyFilters() {
  buildFiltered();
  currentIdx = 0;
  buildSidebar();
  renderCard();
}

['f-exam','f-domain','f-diff','f-type','f-status'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

let searchTimer;
document.getElementById('f-search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 300);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' || e.key === 'n') nextCard();
  if (e.key === 'ArrowLeft' || e.key === 'p') prevCard();
  if (e.key === '1') { const s = filtered[currentIdx]; if(s) markScore(s.id,'correct'); }
  if (e.key === '2') { const s = filtered[currentIdx]; if(s) markScore(s.id,'incorrect'); }
  if (e.key === 'a') { const s = filtered[currentIdx]; if(s) reveal('answer', s.id); }
});

buildDomainFilter();
buildFiltered();
buildSidebar();
renderCard();
updateNavStats();
</script>
</body>
</html>
