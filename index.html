<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CompTIA A+ PBQ Study Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f4;
  --border:#e0e0e0;--border2:#bbb;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --blue:#1565c0;--blue-bg:#e3f2fd;--blue-light:#bbdefb;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-light:#c8e6c9;
  --orange:#e65100;--orange-bg:#fff3e0;--orange-light:#ffe0b2;
  --red:#c62828;--red-bg:#ffebee;--red-light:#ffcdd2;
  --purple:#4a148c;--purple-bg:#f3e5f5;--purple-light:#ce93d8;
  --teal:#00695c;--teal-bg:#e0f2f1;
  --yellow-bg:#fffde7;--yellow-border:#f9a825;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

/* NAV */
.nav{background:var(--blue);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.nav-brand span{opacity:.7;font-weight:400;font-size:14px;margin-left:8px}
.nav-stats{display:flex;gap:16px;font-size:13px}
.nav-stat{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px}
.nav-stat b{font-weight:600}

/* FILTER BAR */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap}
select{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);cursor:pointer;min-width:130px}
select:focus{outline:2px solid var(--blue);border-color:transparent}
.search-wrap{flex:1;min-width:200px}
.search-wrap input{width:100%;padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.search-wrap input:focus{outline:2px solid var(--blue);border-color:transparent}
.btn-reset{padding:5px 14px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);font-size:13px;cursor:pointer;color:var(--text2)}
.btn-reset:hover{background:var(--surface2)}

/* PROGRESS BAR */
.progress-bar-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px}
.progress-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.progress-text{font-size:12px;color:var(--text2);white-space:nowrap;min-width:80px;text-align:right}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 120px)}
@media(max-width:768px){.layout{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 120px);position:sticky;top:120px}
@media(max-width:768px){.sidebar{display:none}}
.sidebar h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.sidebar-list{list-style:none}
.sidebar-item{padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;transition:background .15s}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-item.active{background:var(--blue-bg);color:var(--blue);font-weight:500}
.sidebar-item.done{opacity:.5}
.sidebar-badge{font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--text3)}
.sidebar-item.active .sidebar-badge{background:var(--blue-light);color:var(--blue)}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:10px 0}

/* MAIN */
.main{padding:20px;max-width:860px}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.empty p{font-size:14px}

/* SCENARIO CARD */
.scenario-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}

/* CARD HEADER */
.card-header{background:var(--blue);color:#fff;padding:14px 18px;display:flex;align-items:flex-start;gap:14px}
.card-num{background:rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:18px;font-weight:700;min-width:44px;text-align:center;flex-shrink:0}
.card-title-area{flex:1}
.card-title{font-size:16px;font-weight:600;margin-bottom:4px}
.card-meta{font-size:12px;opacity:.8;line-height:1.4}
.card-badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-diff-easy{background:var(--green-bg);color:var(--green)}
.badge-diff-medium{background:var(--orange-bg);color:var(--orange)}
.badge-diff-hard{background:var(--red-bg);color:var(--red)}
.badge-ui{background:rgba(255,255,255,.2);color:#fff}
.badge-exam{background:rgba(255,255,255,.15);color:#fff;font-size:11px}

/* CARD SECTIONS */
.card-section{padding:16px 18px;border-top:1px solid var(--border)}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}

/* SCENARIO TEXT */
.scenario-text{background:var(--blue-bg);border-left:4px solid var(--blue);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;font-size:14px;white-space:pre-wrap;line-height:1.65;color:var(--text)}

/* REVEAL BUTTONS */
.reveal-buttons{display:flex;flex-wrap:wrap;gap:8px;padding:14px 18px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-reveal-answer{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.btn-reveal-answer:hover{background:var(--green-light)}
.btn-reveal-wrong{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.btn-reveal-wrong:hover{background:var(--orange-light)}
.btn-reveal-rationale{background:var(--yellow-bg);border-color:var(--yellow-border);color:#795548}
.btn-reveal-rationale:hover{background:#fff9c4}
.btn-score-correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.btn-score-incorrect{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.btn-score-skip{background:var(--surface2);border-color:var(--border2);color:var(--text2)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ANSWER AREA */
.answer-box{display:none;background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;font-size:14px;white-space:pre-wrap;line-height:1.65}
.wrong-box{display:none;background:var(--orange-bg);border-left:4px solid var(--orange);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;font-size:14px;white-space:pre-wrap;line-height:1.65}
.rationale-box{display:none;background:var(--yellow-bg);border-left:4px solid var(--yellow-border);border-radius:0 var(--radius) var(--radius) 0;padding:14px 16px;font-size:14px;white-space:pre-wrap;line-height:1.65}
.answer-box.shown,.wrong-box.shown,.rationale-box.shown{display:block}

/* SCORE ACTIONS */
.score-actions{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--border);background:var(--surface2)}
.score-actions .label{font-size:12px;color:var(--text2);align-self:center;flex:1}
.answered-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500}
.answered-correct{background:var(--green-bg);color:var(--green)}
.answered-incorrect{background:var(--red-bg);color:var(--red)}
.answered-skipped{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* NAVIGATION */
.card-nav{display:flex;gap:8px;align-items:center;padding:12px 18px;border-top:1px solid var(--border)}
.btn-prev,.btn-next{padding:7px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2)}
.btn-prev:hover,.btn-next:hover{background:var(--surface2)}
.btn-next-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-next-primary:hover{background:#1251a3}
.card-nav-info{flex:1;text-align:center;font-size:13px;color:var(--text2)}

/* STATS DASHBOARD */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.stat-card .num{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.correct .num{color:var(--green)}
.stat-card.incorrect .num{color:var(--red)}
.stat-card.skipped .num{color:var(--text3)}

/* DOMAIN BREAKDOWN */
.domain-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.domain-row:last-child{border-bottom:none}
.domain-name{flex:1;color:var(--text)}
.domain-bar-wrap{width:120px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.domain-bar{height:100%;border-radius:3px;background:var(--blue)}
.domain-count{width:50px;text-align:right;color:var(--text2);font-size:12px}

/* UI TYPE COLORS */
.ui-drag{background:#e3f2fd;color:#1565c0}
.ui-drop{background:#e8f5e9;color:#2e7d32}
.ui-text{background:#fff3e0;color:#e65100}
.ui-radio{background:#f3e5f5;color:#6a1b9a}
.ui-cli{background:#263238;color:#80cbc4}

/* WELCOME SCREEN */
.welcome{padding:32px 20px;max-width:700px;margin:0 auto}
.welcome h1{font-size:26px;font-weight:700;margin-bottom:6px}
.welcome p{color:var(--text2);margin-bottom:24px;font-size:15px}
.welcome-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.welcome-card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.welcome-card p{font-size:13px;color:var(--text2);line-height:1.5}
.btn-start{background:var(--blue);color:#fff;border:none;padding:12px 28px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer}
.btn-start:hover{background:#1251a3}
</style>
<script>
const ALL_SCENARIOS = [{"id":1,"exam":"220-1201","domain":"1.0 Mobile Devices","objective":"1.1","objectiveText":"Given a scenario, monitor mobile device hardware and use appropriate replacement techniques.","title":"Laptop Battery Replacement Sequence","difficulty":"Medium","uiType":"Drag and Drop (Order Steps)","scenario":"A user brings in a laptop complaining that the battery no longer holds a charge. After confirming the battery is the issue, you need to replace it. The following steps are listed out of order. Arrange them in the correct sequence to safely complete the battery replacement.\n\nSteps to arrange:\nA. Remove the retaining screws securing the battery\nB. Disconnect the laptop from AC power\nC. Install the new battery and reconnect the battery connector\nD. Remove the bottom panel of the laptop\nE. Remove the battery from the chassis\nF. Power off the laptop completely\nG. Hold the power button for 10 seconds to discharge residual electricity\nH. Replace the bottom panel and secure all screws","correctAnswer":"Correct order: F, B, G, D, A, E, C, H\n\n1. F - Power off the laptop completely\n2. B - Disconnect from AC power\n3. G - Hold power button 10 seconds to discharge residual electricity\n4. D - Remove the bottom panel\n5. A - Remove retaining screws securing the battery\n6. E - Remove the battery from the chassis\n7. C - Install new battery and reconnect the battery connector\n8. H - Replace the bottom panel and secure all screws","wrongAnswers":["Starting with D (Remove the bottom panel) before powering off — the laptop is still live. Working on powered hardware risks electrostatic discharge and personal injury.","Skipping step G (discharging residual electricity) — even after disconnecting power, capacitors retain a charge. Skipping this step can damage components or shock the technician.","Placing C (Install new battery) before E (Remove old battery) — you must remove the old battery before inserting the new one."],"rationale":"Battery replacement follows ESD-safe procedures: always power off first, disconnect AC, then discharge residual power before opening the chassis. This sequence protects both the technician and sensitive internal components. The 10-second power-button hold drains any charge stored in capacitors."},{"id":2,"exam":"220-1201","domain":"1.0 Mobile Devices","objective":"1.2","objectiveText":"Compare and contrast accessories and connectivity options for mobile devices.","title":"Mobile Device Connector Identification","difficulty":"Easy","uiType":"Drag and Drop (Match)","scenario":"Match each mobile device connector/port type to its correct description. Drag each description to the correct connector label.\n\nConnectors: USB-C, Lightning, Micro-USB, USB-A, MicroSD slot\n\nDescriptions:\n1. A proprietary connector used exclusively by Apple iPhones prior to iPhone 15\n2. A reversible connector used on modern Android phones, laptops, and tablets that supports USB 3.x and power delivery\n3. A legacy connector found on older Android devices, no longer common on flagship phones\n4. An expansion slot used to add removable flash storage to Android devices and cameras\n5. A rectangular host connector found on desktops and hubs, rarely on phones themselves","correctAnswer":"Lightning → 1 (Proprietary Apple connector, pre-iPhone 15)\nUSB-C → 2 (Reversible, modern standard, supports power delivery)\nMicro-USB → 3 (Legacy Android connector)\nMicroSD slot → 4 (Removable flash storage expansion)\nUSB-A → 5 (Rectangular host connector)","wrongAnswers":["Matching Lightning to USB-C — Lightning is Apple-proprietary and non-reversible only in the sense that it has one side facing up; USB-C is the universal reversible standard used industry-wide.","Matching MicroSD to USB-A — MicroSD is a storage expansion card slot, not a USB connector at all.","Matching Micro-USB to USB-C — these look similar at a glance but are different standards. Micro-USB is the older standard and does not support USB 3.x speeds or power delivery."],"rationale":"Objective 1.2 expects technicians to identify wired connectivity options on mobile devices. Lightning is Apple-only (used pre-iPhone 15), USB-C is the modern universal standard, and Micro-USB is the legacy standard. MicroSD is for storage expansion, not data/power transfer."},{"id":3,"exam":"220-1201","domain":"1.0 Mobile Devices","objective":"1.3","objectiveText":"Given a scenario, configure basic mobile device network connectivity and provide application support.","title":"Mobile Hotspot Configuration","difficulty":"Easy","uiType":"Drop-Down Selection","scenario":"A field technician needs to share their phone's cellular data connection with a laptop while on a job site with no Wi-Fi. They open the phone's settings to configure the connection.\n\nUsing the simulated settings screen below, select the correct option from each drop-down to enable and secure the mobile hotspot.\n\n[Simulated Settings Screen]\nFeature to enable: [ ▼ ]\n  Options: Bluetooth pairing / Mobile Hotspot (Tethering) / Airplane Mode / NFC\n\nSecurity type for the hotspot network: [ ▼ ]\n  Options: None (Open) / WEP / WPA2 / WPA3-Enterprise\n\nData to confirm is enabled before proceeding: [ ▼ ]\n  Options: Wi-Fi / Cellular data / Bluetooth / Location services","correctAnswer":"Feature to enable: Mobile Hotspot (Tethering)\nSecurity type: WPA2 (or WPA3 if available, but WPA2 is the minimum acceptable)\nData to confirm: Cellular data","wrongAnswers":["Feature: Bluetooth pairing — Bluetooth tethering is possible but far slower and more limited than the Wi-Fi hotspot option. The scenario calls for sharing with a laptop, which implies Wi-Fi hotspot.","Security type: None (Open) — leaving the hotspot open exposes it to anyone nearby and is a serious security risk on a mobile cellular plan.","Data to confirm: Wi-Fi — the phone uses its cellular data connection as the source for the hotspot; if cellular data is off, the hotspot will have no internet connection to share."],"rationale":"Mobile hotspot tethering shares the device's cellular connection over Wi-Fi. WPA2 is the minimum recommended security standard for hotspots. Cellular data must be active as the upstream source. This tests practical mobile configuration knowledge from objective 1.3."},{"id":4,"exam":"220-1201","domain":"2.0 Networking","objective":"2.1","objectiveText":"Compare and contrast TCP and UDP ports, protocols, and their purposes.","title":"Protocol-to-Port Matching","difficulty":"Easy","uiType":"Drag and Drop (Match)","scenario":"Match each network protocol to its correct port number. Drag each port number to the corresponding protocol.\n\nProtocols: FTP (control), SSH, SMTP, DNS, HTTPS, RDP, IMAP, LDAP\n\nPort numbers available: 21, 22, 25, 53, 143, 389, 443, 3389","correctAnswer":"FTP (control) → 21\nSSH → 22\nSMTP → 25\nDNS → 53\nIMAP → 143\nLDAP → 389\nHTTPS → 443\nRDP → 3389","wrongAnswers":["FTP → 20 (port 20 is FTP data transfer in active mode; port 21 is FTP control. The question asks for the control connection port.)","DNS → 80 (port 80 is HTTP. DNS uses port 53 for both UDP and TCP name resolution.)","IMAP → 110 (port 110 is POP3. IMAP uses port 143. A common swap on the exam.)"],"rationale":"Port number memorization is explicitly tested on the 220-1201 exam. The most commonly confused pairs are FTP 20/21, IMAP 143 vs POP3 110, and HTTP 80 vs HTTPS 443. DNS runs on UDP/53 for queries and TCP/53 for zone transfers."},{"id":5,"exam":"220-1201","domain":"2.0 Networking","objective":"2.1","objectiveText":"Compare and contrast TCP and UDP ports, protocols, and their purposes.","title":"TCP vs UDP Protocol Classification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each protocol by placing it in the correct column: TCP Only, UDP Only, or Both TCP and UDP.\n\nProtocols to categorize: HTTP, DNS, DHCP, FTP, TFTP, VoIP (RTP), SSH, SNMP","correctAnswer":"TCP Only: HTTP, FTP, SSH\nUDP Only: DHCP, TFTP, VoIP (RTP), SNMP\nBoth TCP and UDP: DNS\n\nNotes: DNS uses UDP/53 for standard queries (small responses) and TCP/53 for zone transfers and large responses. DHCP uses UDP/67 (server) and UDP/68 (client) because no established connection exists when the client boots.","wrongAnswers":["Placing DNS in TCP Only — DNS primarily uses UDP for queries but also uses TCP for zone transfers. It belongs in both.","Placing DHCP in TCP — DHCP cannot use TCP because the client does not have an IP address yet when it broadcasts a DHCP Discover message; TCP requires an established connection.","Placing VoIP/RTP in TCP — RTP uses UDP intentionally. For real-time audio/video, a missed packet is better dropped and skipped than retransmitted (retransmission causes worse disruption to audio quality than a small gap)."],"rationale":"Understanding TCP vs UDP is foundational for firewall rules, network troubleshooting, and security. TCP provides reliable, connection-oriented delivery. UDP is connectionless and faster but unreliable. DNS uniquely uses both."},{"id":6,"exam":"220-1201","domain":"2.0 Networking","objective":"2.4","objectiveText":"Compare and contrast networking hardware.","title":"Subnet Mask Entry","difficulty":"Medium","uiType":"Text Input","scenario":"A technician is configuring a workstation with the following static IP information:\n\nIP Address: 192.168.10.45\nThe network needs to support up to 30 hosts.\nDefault Gateway: 192.168.10.1\n\nIn the Subnet Mask field of the Windows network adapter settings, type the subnet mask that supports up to 30 hosts on this network.","correctAnswer":"255.255.255.224\n\nA /27 subnet mask (255.255.255.224) provides 32 addresses, with 30 usable host addresses (32 - 2 for network and broadcast). This is the smallest mask that supports exactly 30 hosts. The CIDR notation is /27.","wrongAnswers":["255.255.255.240 — This is a /28, providing only 14 usable hosts, which is fewer than the 30 required.","255.255.255.0 — This is a /24, providing 254 usable hosts. It works but wastes IP space, and the exam would be looking for the most efficient mask.","255.255.255.128 — This is a /25, providing 126 usable hosts. Again functional but not the best-fit answer."],"rationale":"Subnetting is tested on the 220-1201 exam. The formula for usable hosts is 2^n - 2, where n is the number of host bits. For 30 hosts, 2^5 - 2 = 30, which requires 5 host bits and a /27 mask (255.255.255.224)."},{"id":7,"exam":"220-1201","domain":"2.0 Networking","objective":"2.2","objectiveText":"Explain wireless networking technologies.","title":"802.11 Standard Selection","difficulty":"Easy","uiType":"Drop-Down Selection","scenario":"A company is deploying a new wireless network that must meet these requirements:\n- Maximum theoretical throughput of at least 9.6 Gbps\n- Support for both 2.4 GHz and 5 GHz bands\n- Multi-user MIMO (MU-MIMO) support\n- Also marketed as Wi-Fi 6\n\nIn the access point configuration panel, select the correct 802.11 standard from the drop-down.\n\n[ ▼ ]\nOptions: 802.11a / 802.11n / 802.11ac / 802.11ax / 802.11be","correctAnswer":"802.11ax\n\n802.11ax (Wi-Fi 6) supports up to 9.6 Gbps theoretical throughput, operates on both 2.4 GHz and 5 GHz, and introduced OFDMA and improved MU-MIMO. Wi-Fi 6E also includes 6 GHz. The \"Wi-Fi 6\" marketing name maps directly to 802.11ax.","wrongAnswers":["802.11ac — This is Wi-Fi 5, max 3.5 Gbps theoretical, 5 GHz only. It does not reach 9.6 Gbps.","802.11n — This is Wi-Fi 4, max 600 Mbps, and the oldest dual-band standard. Far below the 9.6 Gbps requirement.","802.11be — This is Wi-Fi 7, which exceeds 9.6 Gbps (46 Gbps theoretical) but was not marketed as Wi-Fi 6. The scenario explicitly states Wi-Fi 6."],"rationale":"Wireless standards map directly to Wi-Fi generation marketing names: 802.11n=Wi-Fi 4, 802.11ac=Wi-Fi 5, 802.11ax=Wi-Fi 6, 802.11be=Wi-Fi 7. The 220-1201 exam tests these mappings along with frequency band support and bandwidth capabilities."},{"id":8,"exam":"220-1201","domain":"2.0 Networking","objective":"2.5","objectiveText":"Given a scenario, deploy and configure networks.","title":"Network Cable Category Selection","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"A network engineer is designing cable infrastructure for three different scenarios. Match each scenario to the correct cable category/type that best meets its requirements.\n\nScenarios:\nA. A 10 Gbps Ethernet run of 55 meters inside a building\nB. A 1 Gbps Ethernet run of 90 meters between two offices\nC. A connection between a cable modem and the ISP's coaxial infrastructure\nD. A fiber run of 10 km between two buildings\n\nCable options: Cat 5e, Cat 6, Cat 6a, RG-6 Coaxial, Single-mode fiber (SMF)","correctAnswer":"A (10 Gbps, 55m) → Cat 6a (supports 10GbE up to 100m; Cat 6 only supports 10GbE to 55m)\nB (1 Gbps, 90m) → Cat 5e or Cat 6 (both support 1GbE up to 100m)\nC (Cable modem/ISP coax) → RG-6 Coaxial\nD (10 km between buildings) → Single-mode fiber (SMF supports distances up to 40+ km)","wrongAnswers":["Scenario A → Cat 6 — Cat 6 supports 10GbE but only up to 55 meters. At exactly 55m it is the borderline spec; Cat 6a is the safe choice for reliable 10GbE at that distance.","Scenario D → Multimode fiber — Multimode fiber (MMF) typically supports distances up to 550m (OM3/OM4). A 10 km run requires single-mode fiber.","Scenario B → Cat 3 — Cat 3 only supports 10 Mbps (10BASE-T). It cannot support 1 Gbps."],"rationale":"Cable selection is a practical skill tested in objective 2.5. Key rules: Cat 5e/6 support 1GbE to 100m; Cat 6 supports 10GbE to 55m; Cat 6a supports 10GbE to 100m. Coax (RG-6) is used for cable TV/ISP connections. Long-distance runs between buildings require fiber, and beyond 550m requires single-mode."},{"id":9,"exam":"220-1201","domain":"2.0 Networking","objective":"2.6","objectiveText":"Compare and contrast common network configuration concepts.","title":"ipconfig Network Diagnostics","difficulty":"Medium","uiType":"Command Prompt / Terminal","scenario":"A user reports they cannot browse the internet but can ping their default gateway. You remote into the workstation to investigate. The workstation shows the following ipconfig /all output:\n\nIPv4 Address: 169.254.45.12\nSubnet Mask: 255.255.0.0\nDefault Gateway: (blank)\nDNS Servers: (blank)\nDHCP Enabled: Yes\n\nType the command you would run next to force the workstation to request a new IP address from the DHCP server.","correctAnswer":"ipconfig /release\nipconfig /renew\n\n(Both commands are required. /release drops the current APIPA address; /renew sends a DHCP Discover to request a valid address.)","wrongAnswers":["ipconfig /flushdns — This clears the DNS resolver cache. It would not fix an IP address problem; the issue here is DHCP, not DNS.","netstat -an — This shows active connections. Useful for troubleshooting open ports but unrelated to obtaining a DHCP lease.","ping 8.8.8.8 — This tests internet connectivity but does not resolve the root cause, which is the APIPA address indicating a DHCP failure."],"rationale":"An APIPA address in the 169.254.x.x range means the workstation could not reach a DHCP server. The correct fix is ipconfig /release followed by ipconfig /renew to force a new DHCP lease request. This is a foundational network troubleshooting skill tested across objectives 2.6 and 5.2."},{"id":10,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.3","objectiveText":"Given a scenario, install and configure RAM.","title":"RAM Type and Slot Configuration","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A technician is upgrading RAM in a desktop workstation. The motherboard documentation states the following:\n- Supports DDR5 memory only\n- 4 DIMM slots arranged in 2 channels (A1, A2, B1, B2)\n- Supports dual-channel mode when DIMMs are installed in matched pairs\n- Maximum capacity: 128 GB\n\nThe customer wants to add 32 GB of RAM using two 16 GB sticks for maximum performance.\n\nQuestion 1: What RAM form factor goes in a standard desktop motherboard?\n[ ▼ ] Options: DIMM / SO-DIMM / SIMM / MicroDIMM\n\nQuestion 2: To enable dual-channel mode with two sticks, which slots should be populated?\n[ ▼ ] Options: A1 and A2 / A1 and B1 / B1 and B2 / Any two adjacent slots\n\nQuestion 3: Which generation of DDR uses 288 pins and requires a different motherboard than DDR4?\n[ ▼ ] Options: DDR3 / DDR4 / DDR5 / DDR5 ECC","correctAnswer":"Q1: DIMM (Dual Inline Memory Module) is the desktop form factor. SO-DIMM is used in laptops and some small form factor systems.\nQ2: A1 and B1 (or A2 and B2) — dual-channel requires one stick per channel. A1 and B1 are in different channels.\nQ3: DDR5 — DDR5 uses 288 pins like DDR4 but is physically keyed differently, preventing installation in DDR4 slots. The motherboard must explicitly support DDR5.","wrongAnswers":["Q1: SO-DIMM — SO-DIMM is the laptop form factor, smaller than a DIMM. It would not physically fit in a desktop motherboard slot.","Q2: A1 and A2 — These two slots are in the same channel (Channel A). Using same-channel slots enables single-channel mode, reducing memory bandwidth significantly.","Q3: DDR4 — DDR4 and DDR5 both use 288 pins but have different key notch positions. DDR4 and DDR5 are not interchangeable on the same motherboard."],"rationale":"RAM installation requires understanding form factors (DIMM vs SO-DIMM), slot configuration for dual-channel (one per channel, not two in the same channel), and DDR generation compatibility. DDR5 is physically incompatible with DDR4 motherboards despite the same pin count."},{"id":11,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.4","objectiveText":"Given a scenario, select and install storage devices.","title":"Storage Interface Selection","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each storage interface/technology to the scenario where it is the best choice.\n\nInterfaces: SATA III, NVMe (M.2 PCIe), SAS, eMMC, USB 3.2 Gen 2\n\nScenarios:\nA. A server that requires 12 Gbps transfer speed and enterprise-grade reliability for a disk array\nB. A budget laptop where the storage is soldered directly to the motherboard and is not user-replaceable\nC. A desktop PC upgrade that needs the fastest possible internal boot drive; the motherboard has an M.2 slot\nD. A standard desktop that already has a 2.5-inch hard drive bay and needs a budget SSD upgrade\nE. A portable external drive used for moving large video files between workstations","correctAnswer":"A (Server, 12 Gbps, enterprise) → SAS (Serial Attached SCSI, up to 24 Gbps, enterprise-grade, hot-swappable)\nB (Soldered laptop storage) → eMMC (embedded MultiMediaCard, soldered onto motherboard, common in budget Chromebooks/tablets)\nC (Fastest internal desktop, M.2 slot) → NVMe (M.2 PCIe) (up to 7 GB/s on Gen 4, far faster than SATA)\nD (2.5-inch bay, budget SSD) → SATA III (6 Gbps, backward compatible, works in existing 2.5-inch bays)\nE (Portable external) → USB 3.2 Gen 2 (10 Gbps, standard for external drives)","wrongAnswers":["Scenario C → SATA III — SATA III is limited to 6 Gbps. An NVMe drive in the same M.2 slot delivers up to 7 GB/s using PCIe lanes, making NVMe 5-10x faster for the use case described.","Scenario A → NVMe — While NVMe is fast, SAS is the enterprise standard for disk arrays. SAS supports dual-port connections, error recovery, and is designed for 24/7 server workloads.","Scenario B → SATA SSD — eMMC is specifically the soldered, non-replaceable form found in budget devices. A SATA SSD is a separate, user-removable drive."],"rationale":"Storage interface selection is a core hardware skill. NVMe offers the best performance but requires M.2/PCIe; SATA III is the standard upgrade path for existing bays; SAS is enterprise-grade; eMMC is soldered budget storage; USB is for external/portable drives."},{"id":12,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.5","objectiveText":"Given a scenario, install and configure motherboards, CPUs, and add-on cards.","title":"CPU Socket Compatibility","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A technician is building a new workstation. The customer has purchased an AMD Ryzen 9 7950X processor and needs help selecting a compatible motherboard. The technician pulls up the CPU specifications.\n\nKey specs shown:\n- Architecture: Zen 4\n- Socket: AM5\n- TDP: 170W\n- Memory type support: DDR5 only\n\nQuestion 1: Which motherboard socket must the technician select?\n[ ▼ ] Options: AM4 / AM5 / LGA 1700 / LGA 1200\n\nQuestion 2: The customer wants to reuse their existing DDR4 RAM. What should the technician tell them?\n[ ▼ ] Options: DDR4 will work at reduced speeds / DDR4 is not compatible with AM5 / DDR4 and DDR5 are interchangeable / DDR4 requires an adapter\n\nQuestion 3: The customer later asks if they can reuse this AM5 motherboard with a previous-gen Ryzen 5000 CPU. What is the answer?\n[ ▼ ] Options: Yes, AM5 is backward compatible with AM4 CPUs / No, Ryzen 5000 uses AM4, which is incompatible with AM5 / Yes, with a BIOS update / No, but adapters are available","correctAnswer":"Q1: AM5\nQ2: DDR4 is not compatible with AM5. The Ryzen 7000 series (Zen 4) on AM5 requires DDR5. DDR4 sticks will not physically fit in DDR5 slots.\nQ3: No, Ryzen 5000 uses AM4. AM4 and AM5 are physically different sockets with different pin counts and layouts. No adapter exists.","wrongAnswers":["Q1: AM4 — Zen 4 Ryzen 7000 CPUs use AM5. Zen 3 (Ryzen 5000) used AM4. These are not interchangeable.","Q2: DDR4 will work at reduced speeds — This is incorrect. AM5 does not support DDR4 at all. The slot keying is physically different.","Q3: Yes, with a BIOS update — BIOS updates can sometimes add support for newer CPUs within the same socket family, but not across socket generations."],"rationale":"CPU socket compatibility is a critical hardware concept. AM5 (Zen 4) and AM4 (Zen 3 and older) are entirely different sockets. The 220-1201 exam expects technicians to understand that socket generations are not backward compatible and that memory type (DDR4 vs DDR5) is tied to the platform."},{"id":13,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.5","objectiveText":"Given a scenario, install and configure motherboards, CPUs, and add-on cards.","title":"Expansion Card and PCIe Slot Matching","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each add-on card or expansion component to the correct PCIe slot size or bus type it uses. Some answers may be used more than once.\n\nComponents:\nA. High-end discrete GPU (modern gaming card)\nB. Single-port 10 GbE NIC\nC. NVMe SSD (add-in card form factor)\nD. Sound card\nE. RAID controller card for enterprise storage\n\nSlot types: PCIe x1, PCIe x4, PCIe x16, M.2 (PCIe 4x)","correctAnswer":"A (High-end GPU) → PCIe x16 (GPUs use full x16 electrical bandwidth for maximum performance)\nB (10 GbE NIC) → PCIe x4 or PCIe x1 (NICs typically use x4 physical, x1 electrical; check card spec)\nC (NVMe SSD add-in card) → PCIe x4 or M.2 (PCIe 4x) (NVMe SSDs use PCIe x4 lanes; M.2 form factor uses an M.2 slot which is electrically PCIe x4)\nD (Sound card) → PCIe x1 (sound cards have low bandwidth needs; x1 is sufficient)\nE (RAID controller) → PCIe x8 or PCIe x16 (enterprise RAID controllers need high bandwidth; often x8 electrical in x16 slot)","wrongAnswers":["GPU → PCIe x1 — A GPU in an x1 slot would be severely bottlenecked. GPUs require the full x16 slot for adequate data transfer rates.","Sound card → PCIe x16 — PCIe x1 is more than sufficient for audio. Using a full x16 slot for a sound card wastes a high-bandwidth slot.","NVMe SSD → PCIe x1 — NVMe drives require PCIe x4 bandwidth. An x1 slot cannot supply enough bandwidth for NVMe speeds."],"rationale":"PCIe slot selection depends on bandwidth requirements. GPUs need x16; RAID controllers use x8 or x16; NICs and M.2 NVMe use x4; sound cards and simple cards use x1. Physical slots accept smaller cards (x4 card in x16 slot works), but electrical lanes must match or exceed requirements."},{"id":14,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.1","objectiveText":"Explain basic cable types and their connectors, features, and purposes.","title":"Display Connector Identification","difficulty":"Easy","uiType":"Radio Button","scenario":"A user has a newer monitor that only has one input: a small, 20-pin connector that supports both video and audio, can daisy-chain up to six displays, and delivers up to 100W of power to connected devices.\n\nWhich display connector standard does this monitor use?\n\nO HDMI 2.1\nO DisplayPort\nO VGA\nO USB-C with DisplayPort Alt Mode\nO Thunderbolt 3 / 4","correctAnswer":"Thunderbolt 3 / 4\n\nThunderbolt 3 and 4 use the USB-C physical connector and support: video output (up to two 4K or one 8K display), audio, data transfer (40 Gbps), power delivery up to 100W, and daisy-chaining up to six Thunderbolt devices. The daisy-chain capability and 100W power delivery are the distinguishing features here.","wrongAnswers":["DisplayPort — Standard DisplayPort does support daisy-chaining (via MST) but does not deliver 100W of power to connected devices. The physical connector is also a trapezoid shape, not a small 20-pin form.","HDMI 2.1 — HDMI does not support daisy-chaining and cannot deliver 100W power. HDMI is a dedicated AV connector.","USB-C with DisplayPort Alt Mode — While USB-C can carry DisplayPort signal, DisplayPort Alt Mode alone does not enable daisy-chaining or the 40 Gbps Thunderbolt speeds. The full feature set described requires Thunderbolt."],"rationale":"Thunderbolt 3/4 uses the USB-C physical connector but adds PCIe tunneling, 40 Gbps bandwidth, DisplayPort video, 100W power delivery, and daisy-chaining. This makes it distinct from standard USB-C or USB-C with DisplayPort Alt Mode. The combination of all features described points to Thunderbolt."},{"id":15,"exam":"220-1201","domain":"3.0 Hardware","objective":"3.6","objectiveText":"Given a scenario, deploy and configure multifunction devices/printers and settings.","title":"Printer Connection Type Configuration","difficulty":"Easy","uiType":"Drop-Down Selection","scenario":"An office manager wants to set up a single multifunction printer (MFP) so that all 25 employees can print to it without individually connecting USB cables. The MFP has an Ethernet port, Wi-Fi capability, USB-B port, and Bluetooth.\n\nQuestion 1: What connection method best supports all 25 users printing to the device over the company network?\n[ ▼ ] Options: USB-B to a single workstation / Ethernet to the network switch / Bluetooth pairing / Parallel port\n\nQuestion 2: After connecting the printer to the network, what must be assigned to the printer so other workstations can find and connect to it?\n[ ▼ ] Options: MAC address / IP address / Subnet mask / USB device ID","correctAnswer":"Q1: Ethernet to the network switch — This makes the printer a shared network resource accessible by all users.\nQ2: IP address — An IP address (static or DHCP reservation) allows workstations to locate the printer on the network. Users then install the printer driver pointing to that IP address.","wrongAnswers":["Q1: USB-B to a single workstation — This limits printing to users who connect through that one host workstation. It creates a single point of failure and bottleneck.","Q2: MAC address — The MAC address identifies the physical device at Layer 2 but is not used to address print jobs. A static IP or hostname is used.","Q1: Bluetooth — Bluetooth has a range limitation of about 10 meters and a limited number of paired devices, making it impractical for 25 office users."],"rationale":"Shared printer deployment uses network connectivity (Ethernet or Wi-Fi) rather than USB. Once connected to the network, the printer needs a consistent IP address so workstations can always reach it. A static IP or DHCP reservation is best practice for shared devices."},{"id":16,"exam":"220-1201","domain":"4.0 Virtualization and Cloud Computing","objective":"4.1","objectiveText":"Summarize cloud-computing concepts.","title":"Cloud Service Model Classification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each cloud service example into the correct service model: IaaS (Infrastructure as a Service), PaaS (Platform as a Service), or SaaS (Software as a Service).\n\nServices to categorize:\nA. Microsoft 365 (Word, Outlook, Teams accessed via browser)\nB. AWS EC2 (virtual machines you configure and manage)\nC. Google App Engine (developers deploy code; Google manages the runtime)\nD. Salesforce CRM (cloud-based customer management software)\nE. Microsoft Azure Virtual Machines\nF. Heroku (developers push code; platform handles scaling and OS)\nG. Dropbox (cloud storage accessed through an app or browser)","correctAnswer":"IaaS: B (AWS EC2), E (Azure VMs)\nPaaS: C (Google App Engine), F (Heroku)\nSaaS: A (Microsoft 365), D (Salesforce), G (Dropbox)\n\nIaaS provides raw infrastructure (VMs, storage, networking). PaaS provides a platform for developers to build/deploy apps without managing OS or runtime. SaaS delivers fully managed software over the internet.","wrongAnswers":["Microsoft 365 → IaaS — Microsoft 365 is a complete end-user application suite delivered via browser or thin client. The user manages nothing infrastructure-related. That is SaaS.","Heroku → IaaS — Heroku abstracts away the OS, server management, and scaling. Developers just push code. That abstraction is the definition of PaaS, not IaaS.","AWS EC2 → SaaS — EC2 gives you a virtual machine. You choose the OS, install software, configure security. You manage the whole stack above the hypervisor. That is IaaS."],"rationale":"Cloud service models define how much the provider vs. the customer manages. IaaS: provider manages hardware/hypervisor; customer manages OS up. PaaS: provider manages up through runtime; customer manages application code. SaaS: provider manages everything; customer just uses the software."},{"id":17,"exam":"220-1201","domain":"4.0 Virtualization and Cloud Computing","objective":"4.1","objectiveText":"Summarize cloud-computing concepts.","title":"Hypervisor Type Identification","difficulty":"Medium","uiType":"Radio Button","scenario":"A hospital is deploying a virtualization infrastructure for their patient records servers. The IT team is evaluating hypervisor options. They need a solution where the hypervisor runs directly on bare metal hardware with no underlying host operating system, providing maximum performance and security isolation between virtual machines.\n\nWhich hypervisor type meets these requirements?\n\nO Type 1 hypervisor (bare-metal)\nO Type 2 hypervisor (hosted)\nO Container hypervisor\nO Para-virtualization only","correctAnswer":"Type 1 hypervisor (bare-metal)\n\nType 1 hypervisors (examples: VMware ESXi, Microsoft Hyper-V, Citrix Hypervisor/XenServer) run directly on the host hardware. There is no host OS layer between the hypervisor and the hardware. This provides better performance, stronger isolation, and is the standard for enterprise/production environments.","wrongAnswers":["Type 2 hypervisor (hosted) — Type 2 hypervisors run as an application on top of a host OS (examples: VirtualBox, VMware Workstation). They are suitable for development/testing but not production enterprise workloads because the host OS introduces additional overhead and attack surface.","Container hypervisor — Containers (Docker, Kubernetes) are not hypervisors. They share the host OS kernel and provide process-level isolation, not full VM isolation. They are not appropriate for strict security isolation between workloads.","Para-virtualization only — Para-virtualization is a technique where the guest OS is modified to communicate with the hypervisor. It is not a standalone hypervisor type."],"rationale":"Type 1 vs Type 2 hypervisor distinction is explicitly tested. Type 1 = bare metal, enterprise production. Type 2 = runs on host OS, for testing/development. Hospitals and financial institutions use Type 1 for performance, reliability, and security isolation."},{"id":18,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.1","objectiveText":"Given a scenario, apply the best practice methodology to resolve problems.","title":"Troubleshooting Methodology Step Ordering","difficulty":"Easy","uiType":"Drag and Drop (Order Steps)","scenario":"A user calls the help desk reporting that their computer shows a black screen after the Windows logo appears during startup. Put the troubleshooting methodology steps in the correct order as you would apply them to this scenario.\n\nSteps (out of order):\nA. Document what you found, what you changed, and the outcome\nB. Identify the problem by gathering information from the user\nC. Test the theory to determine the actual cause (safe boot, different monitor, etc.)\nD. Establish a plan of action and implement the fix\nE. Verify that the system now functions correctly after the fix\nF. Establish a theory of probable cause (driver issue, GPU failure, bad update, etc.)","correctAnswer":"Correct order: B, F, C, D, E, A\n\n1. B - Identify the problem\n2. F - Establish a theory of probable cause\n3. C - Test the theory\n4. D - Establish a plan of action and implement the fix\n5. E - Verify full system functionality\n6. A - Document findings and outcomes","wrongAnswers":["Starting with D (Implement the fix) before identifying or testing — jumping to solutions without diagnosis leads to random changes that may worsen the problem or waste time.","Skipping A (Documentation) — documentation is the final required step in every CompTIA troubleshooting scenario. It creates institutional knowledge and satisfies change management requirements.","Placing E (Verify) before D (Implement fix) — you cannot verify a fix before applying it."],"rationale":"The CompTIA troubleshooting methodology is a defined six-step process. While the exam will not test the methodology steps directly as a standalone question, it informs how scenario-based troubleshooting questions are structured. Identify the problem first, theorize cause, test the theory, fix it, verify, then document."},{"id":19,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.2","objectiveText":"Given a scenario, troubleshoot problems related to motherboards, RAM, CPUs, and power.","title":"POST Beep Code Diagnosis","difficulty":"Hard","uiType":"Radio Button","scenario":"A technician powers on a desktop PC that was just assembled. The system emits a series of beep codes and does not display anything on the monitor. The technician notes: one long beep followed by two short beeps (Award BIOS convention).\n\nBased on standard POST beep code conventions, what does this beep sequence most likely indicate?\n\nO RAM not seated correctly or not detected\nO CPU failure or not installed\nO Video card error or not detected\nO Hard drive failure\nO Power supply insufficient wattage","correctAnswer":"Video card error or not detected.\n\nIn Award BIOS convention, one long beep + two short beeps indicates a video error (GPU not detected or improperly seated). The system cannot POST successfully because it cannot initialize a display. The technician should re-seat the GPU, verify PCIe power connectors, and confirm the card is in the correct slot.","wrongAnswers":["RAM not seated correctly — RAM failure in Award BIOS typically produces continuous short beeps or a different pattern. The 1-long, 2-short code specifically points to video.","CPU failure — A CPU issue typically results in no beep at all, or a completely different beep code depending on the BIOS vendor. The system often will not even reach the beep code stage if the CPU is missing.","Hard drive failure — Hard drives are not tested during POST beep codes. POST beep codes only indicate hardware present at power-on: RAM, CPU, video, and system board."],"rationale":"POST beep codes provide initial hardware diagnostics before a display is available. Award BIOS: 1 long + 2 short = video error. AMI BIOS uses different codes. The exam may present beep code scenarios and expect technicians to identify the affected component. Always document which BIOS vendor the system uses."},{"id":20,"exam":"220-1201","domain":"5.0 Hardware and Network Troubleshooting","objective":"5.7","objectiveText":"Given a scenario, troubleshoot problems with wired and wireless networks.","title":"Network Connectivity Diagnostics via CLI","difficulty":"Hard","uiType":"Command Prompt / Terminal","scenario":"A user reports they cannot reach any websites or internal servers. You remote in and run the following tests:\n\nping 127.0.0.1 → Reply received\nping 192.168.1.1 → Reply received (default gateway)\nping 8.8.8.8 → Request timed out\nnslookup google.com → Server: Unknown / Address: 192.168.1.1 / DNS request timed out\n\nBased on these results, type the single command you would run next to manually test DNS resolution by querying a known public DNS server (8.8.8.8) for \"google.com\".","correctAnswer":"nslookup google.com 8.8.8.8\n\nThis queries Google's public DNS server (8.8.8.8) directly for google.com. If this resolves successfully, the problem is with the local/ISP DNS server at 192.168.1.1. If it also fails, the issue is upstream connectivity beyond the gateway.","wrongAnswers":["ipconfig /flushdns — This clears the local DNS cache but does not test whether the DNS server itself is responding. The test results already show DNS is timing out, so the issue is not a stale cache.","tracert google.com — Tracert would show where the path fails but requires DNS to work to display hostnames. Given the DNS timeout, tracert with an IP (tracert 8.8.8.8) would be more useful.","netsh int ip reset — This resets TCP/IP settings and is a heavy intervention. The data shows the gateway is reachable; the issue appears to be DNS or upstream routing, not a TCP/IP stack corruption."],"rationale":"Systematic network troubleshooting goes layer by layer. Loopback (127.0.0.1) passing confirms TCP/IP stack is intact. Gateway ping passing confirms Layer 3 local connectivity. 8.8.8.8 timing out confirms upstream routing or WAN issue. DNS timeout confirms DNS is failing. The next step is isolating whether the problem is the local DNS server or all external DNS, which nslookup with an explicit server tests directly."},{"id":21,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.5","objectiveText":"Given a scenario, use the appropriate Microsoft command-line tools.","title":"Windows CLI Command Identification","difficulty":"Easy","uiType":"Drag and Drop (Match)","scenario":"Match each Windows command-line tool to its correct primary function. Drag each description to the correct command.\n\nCommands: ipconfig, sfc /scannow, chkdsk, netstat, tasklist, gpupdate /force, diskpart\n\nFunctions:\n1. Displays all running processes and their PIDs\n2. Scans and repairs corrupted Windows system files\n3. Shows IP configuration, releases, and renews DHCP leases\n4. Displays active network connections and listening ports\n5. Used for disk partitioning and volume management\n6. Checks and repairs file system errors and bad sectors on a drive\n7. Forces an immediate application of Group Policy settings","correctAnswer":"ipconfig → 3\nsfc /scannow → 2\nchkdsk → 6\nnetstat → 4\ntasklist → 1\ngpupdate /force → 7\ndiskpart → 5","wrongAnswers":["sfc /scannow → 6 (chkdsk) — sfc (System File Checker) scans Windows system files for corruption and replaces them from a cache. chkdsk checks the disk for file system errors and bad sectors. These are often confused but target different layers.","netstat → 3 (ipconfig) — netstat shows active connections and listening ports. ipconfig shows adapter configuration including IP address, subnet mask, and gateway.","diskpart → 6 (chkdsk) — diskpart is an interactive disk management CLI tool for creating, deleting, and formatting partitions. chkdsk checks existing file system integrity."],"rationale":"Windows CLI tools are heavily tested on the 220-1202 exam. Knowing which tool to reach for in a given scenario is critical. sfc targets Windows system files; chkdsk targets disk health; diskpart manages partitions; ipconfig handles IP configuration; netstat shows network connections; tasklist shows running processes; gpupdate applies Group Policy."},{"id":22,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.1","objectiveText":"Identify basic features of Microsoft Windows editions.","title":"Windows File System Selection","difficulty":"Medium","uiType":"Drop-Down Selection","scenario":"A technician is setting up three different drives on a Windows 11 workstation:\n\nDrive 1: A new 2 TB internal SSD for the Windows OS installation\nDrive 2: A USB thumb drive that needs to be readable on both Windows and macOS without any additional software\nDrive 3: A drive that will store files larger than 4 GB (video production files) and must be readable by Windows\n\nQuestion 1 (Drive 1 - OS install): What file system should be used?\n[ ▼ ] Options: FAT32 / exFAT / NTFS / ext4\n\nQuestion 2 (Drive 2 - Cross-platform USB): What file system provides the best compatibility?\n[ ▼ ] Options: NTFS / FAT32 / exFAT / HFS+\n\nQuestion 3 (Drive 3 - Files larger than 4 GB): Which file system supports files over 4 GB on Windows?\n[ ▼ ] Options: FAT32 / exFAT / NTFS / FAT16","correctAnswer":"Drive 1 (OS SSD): NTFS — Windows requires NTFS for system volumes. NTFS supports permissions, encryption (EFS), journaling, and large file/volume sizes.\nDrive 2 (Cross-platform USB): exFAT — exFAT is supported natively by both Windows and macOS without additional drivers and has no practical file size limit.\nDrive 3 (Files > 4 GB): exFAT or NTFS — FAT32 has a 4 GB per-file size limit. exFAT and NTFS both support very large files. FAT32 cannot be used here.","wrongAnswers":["Drive 1 → FAT32 — FAT32 does not support Windows file permissions or encryption and has a 4 GB file size limit. Windows cannot be installed on a FAT32 partition.","Drive 2 → NTFS — macOS can read NTFS volumes natively but cannot write to them without third-party software. For cross-platform read/write, exFAT is the correct answer.","Drive 3 → FAT32 — FAT32 has a maximum individual file size of 4 GB. Any video file larger than that will fail to copy to a FAT32 drive."],"rationale":"File system selection is a fundamental skill. Key rules: NTFS = Windows OS drives, permissions, encryption. FAT32 = legacy compatibility, 4 GB file size limit. exFAT = cross-platform (Windows + macOS/Linux), no 4 GB limit, no journaling. This is a direct exam objective."},{"id":23,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.4","objectiveText":"Given a scenario, use the appropriate Microsoft Windows 10/11 features and tools.","title":"Windows Administrative Tool Matching","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each Windows administrative task to the correct tool or snap-in used to perform it. Drag each tool to the matching task.\n\nTools: Task Manager, Event Viewer, Device Manager, Local Users and Groups (lusrmgr.msc), Services.msc, Disk Management, Registry Editor (regedit), Resource Monitor\n\nTasks:\nA. View detailed real-time CPU, RAM, disk, and network usage per process\nB. Manage hardware driver updates, disable/enable devices, and see device errors\nC. Create a new local user account or add a user to the Administrators group\nD. Set a Windows service to start automatically and view its current state\nE. Check Windows application/system/security event logs for error codes\nF. Initialize a new disk and create a simple volume\nG. View and edit low-level Windows configuration keys and values\nH. View real-time per-process disk I/O and network usage at a granular level","correctAnswer":"A → Task Manager (Performance and Details tabs show CPU, RAM, disk, network per process)\nB → Device Manager\nC → Local Users and Groups (lusrmgr.msc)\nD → Services.msc\nE → Event Viewer\nF → Disk Management\nG → Registry Editor (regedit)\nH → Resource Monitor (more granular than Task Manager for I/O)","wrongAnswers":["Task A → Resource Monitor — Both Task Manager and Resource Monitor show performance data, but Resource Monitor provides MORE granular per-process disk I/O and network details (Task H). Task Manager provides the general overview at the process level.","Task C → Task Manager — Task Manager does not manage user accounts. lusrmgr.msc (Local Users and Groups) is the correct tool for creating accounts and managing group membership.","Task F → Disk Cleanup — Disk Cleanup frees disk space by removing temp files. Initializing a disk and creating volumes is done in Disk Management."],"rationale":"Windows administrative tools are a major focus of the 220-1202 exam. Distinguishing between tools with overlapping functions (Task Manager vs Resource Monitor) is a common exam trap. Know what each MMC snap-in does: Device Manager for hardware, Services.msc for service management, Event Viewer for logs."},{"id":24,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.2","objectiveText":"Given a scenario, install and upgrade Microsoft Windows.","title":"Windows Boot Process Ordering","difficulty":"Hard","uiType":"Drag and Drop (Order Steps)","scenario":"A technician is explaining the Windows boot process to a junior colleague. Arrange the following boot process steps in the correct sequence, from power-on to the Windows login screen.\n\nSteps (out of order):\nA. Windows Boot Manager (bootmgr) reads the Boot Configuration Data (BCD) store\nB. BIOS/UEFI performs Power-On Self-Test (POST)\nC. WinLogon presents the login screen\nD. Windows kernel (ntoskrnl.exe) loads and initializes\nE. BIOS/UEFI hands control to the bootloader on the active partition\nF. Windows Boot Loader (winload.exe) loads the OS kernel into memory\nG. Session Manager (smss.exe) launches user-mode processes\nH. The Master Boot Record (MBR) or GPT is read to find the active/EFI partition","correctAnswer":"Correct order: B, H, E, A, F, D, G, C\n\n1. B - POST (BIOS/UEFI hardware check)\n2. H - MBR/GPT is read to locate boot partition\n3. E - BIOS/UEFI hands control to bootloader\n4. A - Windows Boot Manager reads BCD store\n5. F - winload.exe loads kernel into memory\n6. D - ntoskrnl.exe loads and initializes\n7. G - smss.exe launches user-mode processes\n8. C - WinLogon presents the login screen","wrongAnswers":["Placing A (Boot Manager) before E (BIOS hands off to bootloader) — BIOS/UEFI must locate and hand control to the bootloader before Boot Manager can run.","Placing C (Login screen) before G (smss.exe) — WinLogon is a child of smss.exe. Session Manager must launch first.","Placing D (Kernel loads) before F (winload.exe) — winload.exe is responsible for loading the kernel. You cannot have the kernel present before its loader runs."],"rationale":"Understanding the Windows boot process helps with troubleshooting startup failures. BIOS POST comes first, then the boot partition is located, then Boot Manager, then the kernel loader (winload.exe), then kernel initialization, then session/user-mode startup, then login. BCD corruption, MBR damage, or missing winload.exe each cause specific boot failures."},{"id":25,"exam":"220-1202","domain":"1.0 Operating Systems","objective":"1.5","objectiveText":"Given a scenario, use the appropriate Microsoft command-line tools.","title":"Registry Path Identification","difficulty":"Hard","uiType":"Text Input","scenario":"A technician needs to find where Windows stores the list of programs that automatically launch when a user logs in (user-specific startup programs, not system-wide). This information is stored in the Windows Registry.\n\nType the full registry path for user-specific startup programs.","correctAnswer":"HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\n\nNote: The system-wide equivalent (for all users) is:\nHKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\CurrentVersion\\Run","wrongAnswers":["HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\CurrentVersion\\Run — This is the system-wide Run key (applies to all users), not the user-specific key. The question specifically asks for user-specific startup entries.","HKEY_CURRENT_USER\\System\\CurrentControlSet\\Services — This path is for Windows services, not startup programs.","HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\RunOnce — RunOnce entries execute only once and then delete themselves. The question asks for persistent startup programs, which live in the Run key."],"rationale":"Registry paths for startup programs are tested on the 220-1202 exam. HKCU\\...\\Run = user-specific startup (per-user). HKLM\\...\\Run = system-wide startup (all users). RunOnce entries are one-time-execution. These paths are critical for malware removal and system troubleshooting."},{"id":26,"exam":"220-1202","domain":"2.0 Security","objective":"2.4","objectiveText":"Summarize types of malware and tools/methods for detection, removal, and prevention.","title":"Malware Removal Process Ordering","difficulty":"Medium","uiType":"Drag and Drop (Order Steps)","scenario":"A user's Windows workstation is showing signs of malware infection: browser redirects, pop-up ads, and unexpected CPU usage spikes. Arrange the malware removal steps in the correct recommended sequence.\n\nSteps (out of order):\nA. Run a full scan with updated anti-malware software\nB. Quarantine or remove identified threats\nC. Update anti-malware definitions to the latest version\nD. Disconnect the workstation from the network\nE. Educate the user on safe browsing practices to prevent reinfection\nF. Reboot into Safe Mode to prevent malware from loading on startup\nG. Verify full system functionality and confirm the infection is cleared\nH. Schedule regular automated scans going forward","correctAnswer":"Correct order: D, F, C, A, B, G, E, H\n\n1. D - Disconnect from network (prevent spread/C2 communication)\n2. F - Reboot into Safe Mode (prevent malware autostart)\n3. C - Update anti-malware definitions\n4. A - Run full scan\n5. B - Quarantine/remove threats\n6. G - Verify system is clean and functional\n7. E - Educate the user\n8. H - Schedule ongoing automated scans","wrongAnswers":["Running the scan (A) before updating definitions (C) — outdated definitions may miss newly emerged malware variants. Always update first.","Not disconnecting from the network (D) first — an infected machine may be actively communicating with a command-and-control server or spreading across the network. Isolation is step one.","Skipping user education (E) — the user's behavior likely caused the infection. Without education, reinfection is probable."],"rationale":"CompTIA expects a specific malware removal sequence: quarantine the machine, use Safe Mode to prevent auto-loading, update definitions, scan, remove, verify, and then educate/remediate long-term. Each step has a reason; the order is not arbitrary."},{"id":27,"exam":"220-1202","domain":"2.0 Security","objective":"2.2","objectiveText":"Given a scenario, configure and apply basic Microsoft Windows OS security settings.","title":"NTFS Permission Configuration","difficulty":"Hard","uiType":"Drop-Down Selection","scenario":"A file server has a shared folder structure:\n- C:\\Finance\\Reports\\  — Finance team members need full control\n- C:\\Finance\\Reports\\  — Auditors need read-only access\n- C:\\Finance\\Reports\\  — HR users should have no access\n\nA new user, Maria, is a member of both the Finance and Auditors security groups.\n\nQuestion 1: What NTFS effective permission does Maria have based on standard permission inheritance rules?\n[ ▼ ] Options: Full Control (most permissive wins) / Read Only (most restrictive wins) / No Access / Depends on explicit deny\n\nQuestion 2: An HR manager is in the Auditors group but should NOT be able to read the Reports folder. What is the correct way to restrict this specific user?\n[ ▼ ] Options: Remove from Auditors group / Add an explicit Deny permission for that user / Set permissions to None / Delete the user account temporarily","correctAnswer":"Q1: Full Control — When a user is a member of multiple groups with different Allow permissions on the same resource, NTFS combines (unions) those permissions. Maria gets the most permissive Allow across all group memberships: Full Control.\n\nQ2: Add an explicit Deny permission for that user — Explicit Deny overrides all Allow permissions, including group-inherited ones. This is the correct way to restrict a specific individual without removing them from a group they need for other resources.","wrongAnswers":["Q1: Read Only (most restrictive) — This is a common misconception. NTFS Allow permissions accumulate (most permissive wins). Only Deny overrides this rule.","Q2: Remove from Auditors group — This removes access for all resources the Auditors group grants. The HR manager may need Auditor access elsewhere. An explicit Deny scoped to this folder is more targeted.","Q1: No Access — No Access would only apply if the HR group (No Access) were included in Maria's group memberships. The question specifies Finance (Full Control) and Auditors (Read), so No Access does not apply."],"rationale":"NTFS permissions follow the principle: Allow permissions accumulate (most permissive wins), but Deny always overrides Allow. This is a fundamental security concept tested on the 220-1202 exam and critical for real-world file server administration."},{"id":28,"exam":"220-1202","domain":"2.0 Security","objective":"2.3","objectiveText":"Compare and contrast wireless security protocols and authentication methods.","title":"Wireless Security Protocol Selection","difficulty":"Medium","uiType":"Radio Button","scenario":"An enterprise IT team is configuring wireless security for their corporate network. The requirements are:\n- All employees must authenticate with their Active Directory credentials (username and password), NOT a pre-shared key\n- Encryption must be AES-based\n- The solution must use IEEE 802.1X authentication with a RADIUS server\n\nWhich wireless security configuration meets all three requirements?\n\nO WEP with 128-bit key\nO WPA2-Personal (WPA2-PSK) with AES\nO WPA2-Enterprise with AES and RADIUS (802.1X)\nO WPA3-Personal with SAE\nO WPA-Personal with TKIP","correctAnswer":"WPA2-Enterprise with AES and RADIUS (802.1X)\n\nWPA2-Enterprise uses 802.1X for authentication, which requires a RADIUS server. Users authenticate with individual credentials (not a shared key). Encryption is AES (CCMP). This is the corporate-grade wireless security standard. WPA3-Enterprise is newer and preferred, but WPA2-Enterprise with 802.1X is the answer matching all stated requirements.","wrongAnswers":["WPA2-Personal (WPA2-PSK) with AES — Personal mode uses a pre-shared key (one password for everyone), not per-user Active Directory credentials. It does not use 802.1X or RADIUS.","WPA3-Personal with SAE — WPA3-Personal uses SAE (Simultaneous Authentication of Equals) instead of a PSK, which is more secure but still a shared credential. It does not support 802.1X/RADIUS.","WEP with 128-bit key — WEP is a deprecated, broken encryption standard. It offers no meaningful security and should never be deployed."],"rationale":"WPA2/WPA3-Enterprise uses 802.1X authentication with a RADIUS server, allowing per-user authentication via AD credentials. This is the corporate standard. WPA2/WPA3-Personal uses pre-shared keys and is for home/small office use. The exam distinguishes between Personal (PSK) and Enterprise (802.1X) modes."},{"id":29,"exam":"220-1202","domain":"2.0 Security","objective":"2.2","objectiveText":"Given a scenario, configure and apply basic Microsoft Windows OS security settings.","title":"BitLocker Management Command","difficulty":"Hard","uiType":"Text Input","scenario":"A technician needs to check the current BitLocker encryption status of all drives on a Windows workstation using the command line. The technician opens an elevated (administrator) command prompt.\n\nType the command that displays the BitLocker protection status of all volumes on the system.","correctAnswer":"manage-bde -status\n\nThis command displays the protection status, encryption percentage, key protectors, and lock state for all BitLocker-enabled volumes. The output shows whether each volume is encrypted, pending encryption, or not protected.","wrongAnswers":["cipher /status — The cipher command manages EFS (Encrypting File System) encryption for individual files and folders, not full-disk BitLocker encryption. These are two completely different encryption technologies in Windows.","diskpart — Diskpart manages disk partitions and volumes but does not display or manage BitLocker status.","bcdedit — BCDedit modifies the Boot Configuration Data store. It is unrelated to BitLocker drive encryption status."],"rationale":"BitLocker and EFS are both Windows encryption features but serve different purposes. BitLocker (manage-bde) encrypts entire volumes. EFS (cipher) encrypts individual files/folders using user certificates. manage-bde is the BitLocker command-line tool. This distinction is tested on the 220-1202 security objectives."},{"id":30,"exam":"220-1202","domain":"2.0 Security","objective":"2.5","objectiveText":"Summarize social engineering attacks, threats, and vulnerabilities.","title":"Social Engineering Attack Classification","difficulty":"Medium","uiType":"Drag and Drop (Categorize)","scenario":"Categorize each scenario into the correct social engineering attack type.\n\nAttack types: Phishing, Spear Phishing, Vishing, Smishing, Tailgating/Piggybacking, Pretexting, Shoulder Surfing\n\nScenarios:\nA. An attacker sends a mass email to thousands of users claiming their bank account is locked and asking them to click a link\nB. An attacker calls the IT help desk pretending to be the CEO, asking for an immediate password reset\nC. An attacker follows an employee through a badge-access door before it closes, without scanning their own badge\nD. A targeted email is sent to the CFO using her name, referencing a real upcoming board meeting, asking her to approve a wire transfer\nE. An attacker stands behind a user at a coffee shop and watches them type their password\nF. An attacker sends an SMS message claiming the user's package delivery failed and includes a malicious link\nG. An attacker calls a user claiming to be from Microsoft Support, saying they detected a virus on their computer","correctAnswer":"A → Phishing (mass, generic, email-based)\nB → Pretexting (fabricated identity/scenario to manipulate help desk)\nC → Tailgating/Piggybacking (physical access bypass)\nD → Spear Phishing (targeted, personalized email attack)\nE → Shoulder Surfing (visual eavesdropping)\nF → Smishing (SMS-based phishing)\nG → Vishing (voice/phone-based phishing)","wrongAnswers":["Scenario B → Vishing — Vishing is specifically phone-based social engineering. Scenario B does involve a phone call, so this is a reasonable guess, but Pretexting is the more specific and accurate term. Pretexting involves creating a fabricated scenario (a 'pretext') to manipulate. B could be classified as both, but Pretexting is the primary descriptor.","Scenario D → Phishing — Spear Phishing is the correct term when the attack is targeted and personalized. Generic phishing uses mass, non-personalized emails.","Scenario F → Phishing — SMS-based phishing has the specific name Smishing. Phishing refers to email-based attacks."],"rationale":"The 220-1202 exam expects precise classification of social engineering types. Key distinctions: phishing (email, mass), spear phishing (email, targeted), vishing (voice), smishing (SMS), tailgating (physical access), pretexting (fabricated identity), shoulder surfing (visual)."},{"id":31,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.1","objectiveText":"Given a scenario, troubleshoot common Windows OS problems.","title":"Blue Screen of Death (BSOD) Root Cause Analysis","difficulty":"Medium","uiType":"Radio Button","scenario":"A workstation randomly crashes with a Blue Screen of Death (BSOD). The stop error code displayed is:\n\nSTOP: 0x0000007E — SYSTEM_THREAD_EXCEPTION_NOT_HANDLED\n\nThe crash has been occurring consistently after the user installed a new Bluetooth adapter and its driver last week. The BSOD always occurs within a few minutes of the adapter being detected.\n\nWhat is the most likely root cause and first corrective action?\n\nO Replace the RAM modules, as 0x7E indicates memory failure\nO Roll back or uninstall the Bluetooth driver, as the stop code suggests a problematic driver\nO Reinstall Windows, as the system files are corrupted\nO Increase the page file size to handle the exception\nO Run chkdsk to repair disk errors","correctAnswer":"Roll back or uninstall the Bluetooth driver.\n\nStop code 0x0000007E (SYSTEM_THREAD_EXCEPTION_NOT_HANDLED) indicates an exception was thrown by a system thread that was not handled, often caused by a buggy or incompatible driver. The timing (after driver installation) and consistency strongly point to the new Bluetooth driver. The first step is to boot into Safe Mode, uninstall or roll back the driver, and test for stability.","wrongAnswers":["Replace RAM — Memory-related BSODs typically produce codes like 0x0000001A (MEMORY_MANAGEMENT) or 0x0000003B. The 0x7E code and correlation with driver installation point away from RAM.","Reinstall Windows — This is a last resort. Before reinstalling, always attempt driver rollback, as that is the most targeted fix given the evidence.","Increase page file — Page file issues produce different stop codes (0x0000004E or 0x000000BE). 0x7E is not a page file error."],"rationale":"BSOD stop codes point to different root causes. 0x7E (SYSTEM_THREAD_EXCEPTION_NOT_HANDLED) commonly indicates a driver issue. The timeline (crash started after driver install) confirms this. Always check timing of changes when diagnosing BSODs. Boot Safe Mode to prevent the driver from loading and test stability."},{"id":32,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.1","objectiveText":"Given a scenario, troubleshoot common Windows OS problems.","title":"Windows System File Repair via CLI","difficulty":"Medium","uiType":"Command Prompt / Terminal","scenario":"A technician is troubleshooting a Windows 11 workstation where several system applications fail to launch with the error: \"The program cannot start because a system file is missing or damaged.\"\n\nThe technician suspects Windows system file corruption. They open an elevated command prompt.\n\nType the two commands that should be run, in order:\n1. First, the command that repairs the Windows component store (which SFC depends on to source replacement files)\n2. Second, the command that scans and repairs corrupted Windows system files using the repaired component store","correctAnswer":"Command 1: DISM /Online /Cleanup-Image /RestoreHealth\nCommand 2: sfc /scannow\n\nDISM (Deployment Image Servicing and Management) repairs the Windows Component Store (the source used by SFC). Running SFC first when the component store is damaged may result in SFC finding corrupt files but being unable to repair them. Running DISM first ensures SFC has good source files to work with.","wrongAnswers":["chkdsk /f /r → sfc /scannow — chkdsk repairs file system and disk errors, not Windows system file corruption. It would be run if disk errors were suspected, not for missing system DLLs.","sfc /scannow alone — SFC may not be able to replace corrupted files if the component store itself is damaged. Running DISM first is the best-practice sequence.","Reinstall Windows as the first step — System file corruption should always be addressed with DISM and SFC before considering reinstallation."],"rationale":"The correct sequence is DISM before SFC. DISM repairs the component store from Windows Update or a local source. SFC then uses that clean store to replace corrupted system files. This two-step process is a common exam scenario and a real-world best practice."},{"id":33,"exam":"220-1202","domain":"3.0 Software Troubleshooting","objective":"3.4","objectiveText":"Given a scenario, troubleshoot common mobile OS and application issues.","title":"Mobile App Troubleshooting Steps","difficulty":"Easy","uiType":"Drop-Down Selection","scenario":"A user reports that a banking app on their Android phone keeps crashing every time they try to log in. The phone is running the latest version of Android. Other apps work fine.\n\nQuestion 1: What is the first step you should recommend?\n[ ▼ ] Options: Factory reset the phone / Clear the app's cache and data / Update the operating system / Reinstall the entire OS\n\nQuestion 2: If clearing the cache and data does not fix the issue, what should the technician check next?\n[ ▼ ] Options: Whether the app has an available update in the app store / Whether Bluetooth is enabled / Whether the phone battery is above 80% / Whether the screen brightness is set correctly\n\nQuestion 3: If the app still crashes after updating and clearing cache, and the issue started after a recent Android update, what should be suggested?\n[ ▼ ] Options: Wait for an app update from the developer / Buy a new phone / Disable all other apps / Clear the phone's BIOS","correctAnswer":"Q1: Clear the app's cache and data — This is always the first targeted step for app crashes. Corrupt cached data is a very common cause.\nQ2: Check for an app update in the app store — An outdated app version may be incompatible with the current OS version. An update often contains bug fixes.\nQ3: Wait for an app update from the developer — If the crash followed an OS update, the app may not yet be compatible with the new OS version. This is a developer-side issue requiring a new app release.","wrongAnswers":["Q1: Factory reset — Factory reset is the last resort. It is not appropriate before trying basic steps like clearing cache.","Q2: Check Bluetooth status — Bluetooth being enabled has no bearing on an app crashing during login.","Q3: Clear the phone's BIOS — Mobile devices do not have a BIOS. This is a nonsensical option designed to test whether students know that BIOS is a PC concept."],"rationale":"Mobile app troubleshooting follows a structured approach: clear cache/data first, check for updates, reinstall if needed, and consider OS-app compatibility as a final step. Factory reset is always last resort. Objective 3.4 tests methodical mobile troubleshooting."},{"id":34,"exam":"220-1202","domain":"4.0 Operational Procedures","objective":"4.1","objectiveText":"Given a scenario, implement best practices associated with documentation and support systems.","title":"Backup Type Classification","difficulty":"Medium","uiType":"Drag and Drop (Match)","scenario":"Match each backup scenario to the correct backup type.\n\nBackup types: Full Backup, Incremental Backup, Differential Backup, Synthetic Full Backup\n\nScenarios:\nA. Every Sunday night, all data is copied regardless of whether it has changed\nB. Every weekday night, only files that have changed since the last backup of any kind are copied; the archive bit is cleared after each run\nC. Every weekday night, only files that have changed since the last full backup are copied; the archive bit is NOT cleared\nD. A backup that combines a previous full backup with all subsequent incremental backups into a new full backup, done without reading from the original source data","correctAnswer":"A → Full Backup (copies everything; archive bit cleared)\nB → Incremental Backup (copies changes since last backup of any type; archive bit cleared each time)\nC → Differential Backup (copies all changes since last full; archive bit not cleared, grows over time)\nD → Synthetic Full Backup (constructed from existing full + increments witho
